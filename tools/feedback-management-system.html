<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="店铺Feedback管理系统：负面Feedback监控，优先级处理，解决流程，评分维护策略，CSS统计图。">
<title>店铺Feedback管理系统 - 评分监控与优先处理工具</title>
<style>
:root{--bg:#ffffff;--bg-soft:#f8fafc;--surface:#ffffff;--ink:#0f172a;--ink-soft:#334155;--muted:#64748b;--muted-light:#94a3b8;--rule:#e2e8f0;--rule-light:#f1f5f9;--accent:#4f46e5;--accent-dark:#4338ca;--accent-bg:#eef2ff;--green:#10b981;--green-bg:#ecfdf5;--gold:#f59e0b;--gold-bg:#fffbeb;--red:#ef4444;--red-bg:#fef2f2;--cyan:#0891b2;--cyan-bg:#ecfeff;--shadow-sm:0 1px 2px rgba(0,0,0,0.05);--shadow-md:0 4px 6px -1px rgba(0,0,0,0.07),0 2px 4px -2px rgba(0,0,0,0.05);--shadow-lg:0 10px 15px -3px rgba(0,0,0,0.08),0 4px 6px -4px rgba(0,0,0,0.04);--shadow-xl:0 20px 25px -5px rgba(0,0,0,0.08),0 8px 10px -6px rgba(0,0,0,0.04);--radius-sm:8px;--radius-md:12px;--radius-lg:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg-soft);color:var(--ink);line-height:1.6;font-size:15px;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none;transition:color .2s}
.container{max-width:1152px;margin:0 auto;padding:0 24px}
.top-nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--rule);padding:14px 0}
.top-nav-inner{display:flex;align-items:center;justify-content:space-between}
.top-nav-logo{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:700;color:var(--ink)}
.top-nav-logo .logo-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#6366f1);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px}
.top-nav-links{display:flex;gap:28px;list-style:none}
.top-nav-links a{color:var(--ink-soft);font-size:14px;font-weight:500}
.top-nav-links a:hover{color:var(--accent)}
.workflow-nav{background:linear-gradient(135deg,#f8f9ff 0%,#f0f4ff 100%);border:1px solid #e0e7ff;border-radius:16px;padding:20px 24px;margin:24px auto;max-width:1152px;overflow-x:auto}
.workflow-nav-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:14px}
.workflow-nav-header .workflow-icon{font-size:18px}
.workflow-nav-header .workflow-name{font-weight:600;color:var(--accent)}
.workflow-nav-steps{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.workflow-nav-steps .step{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;background:#fff;border:1px solid #e0e7ff;color:var(--accent);text-decoration:none;transition:all .2s;white-space:nowrap}
.workflow-nav-steps .step:hover{background:var(--accent);color:#fff;transform:translateY(-1px)}
.workflow-nav-steps .step.current{background:var(--accent);color:#fff;font-weight:600}
.workflow-nav-steps .arrow{color:#c7d2fe;font-size:13px}
.breadcrumb{padding:12px 0;font-size:13px;color:var(--muted)}
.breadcrumb a{color:var(--muted)}.breadcrumb a:hover{color:var(--accent)}
.breadcrumb .sep{margin:0 6px;color:var(--rule)}.breadcrumb .current{color:var(--ink);font-weight:500}
.tool-hero{background:linear-gradient(135deg,#eef2ff 0%,#f5f3ff 50%,#fffbeb 100%);padding:48px 0 40px;text-align:center}
.tool-hero-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;background:rgba(255,255,255,.9);border:1px solid rgba(79,70,229,.2);border-radius:50px;font-size:13px;color:var(--accent);font-weight:600;margin-bottom:20px}
.tool-hero h1{font-size:clamp(28px,4vw,42px);font-weight:800;margin-bottom:14px;color:var(--ink)}
.tool-hero h1 em{font-style:normal;background:linear-gradient(135deg,var(--accent),#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tool-hero-desc{font-size:16px;color:var(--muted);max-width:600px;margin:0 auto}
.tool-section{padding:40px 0 60px}
.input-card{background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius-lg);padding:28px;box-shadow:var(--shadow-md);margin-bottom:24px}
.input-card h2{font-size:18px;font-weight:700;margin-bottom:16px;color:var(--ink)}
.form-group{margin-bottom:16px}.form-group label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 16px;border:1px solid var(--rule);border-radius:var(--radius-sm);font-size:14px;color:var(--ink);background:#fff;transition:border-color .2s,box-shadow .2s;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.result-area{margin-top:24px}
.result-card{background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius-lg);padding:28px;box-shadow:var(--shadow-md);margin-bottom:16px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin:20px 0}
.stat-card{padding:18px;border-radius:var(--radius-md);text-align:center;background:var(--bg-soft);border:1px solid var(--rule-light)}
.stat-card .sc-num{font-size:26px;font-weight:800;color:var(--accent)}
.stat-card .sc-num.green{color:var(--green)}.stat-card .sc-num.red{color:var(--red)}.stat-card .sc-num.gold{color:var(--gold)}
.stat-card .sc-label{font-size:12px;color:var(--muted);margin-top:4px}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}.empty-state .icon{font-size:48px;margin-bottom:12px}
.related-tools{background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius-lg);padding:28px;margin-top:32px}
.related-tools h3{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--ink)}
.related-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.related-card{display:flex;gap:10px;padding:14px;background:var(--bg-soft);border-radius:var(--radius-sm);text-decoration:none;transition:all .2s}
.related-card:hover{background:var(--accent-bg);transform:translateX(4px)}
.related-card .ricon{font-size:20px;flex-shrink:0}.related-card .rtext{font-size:13px;font-weight:500;color:var(--ink-soft)}
.back-link{text-align:center;margin-top:32px}
.back-link a{display:inline-flex;align-items:center;gap:8px;padding:12px 32px;border-radius:50px;font-size:14px;font-weight:600;background:linear-gradient(135deg,var(--accent),#6366f1);color:#fff;box-shadow:0 4px 14px rgba(79,70,229,.3);transition:all .2s}
.back-link a:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(79,70,229,.4)}
footer{background:#0f172a;color:rgba(255,255,255,.5);padding:32px 0;text-align:center;font-size:13px;margin-top:40px}
@media(max-width:768px){.form-row,.form-row-3{grid-template-columns:1fr}.top-nav-links{display:none}}

.feedback-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:16px 0}
.feedback-stat{padding:14px;border-radius:var(--radius-md);text-align:center;background:var(--bg-soft);border:1px solid var(--rule-light)}
.feedback-stat .fs-num{font-size:22px;font-weight:800}
.feedback-stat .fs-label{font-size:11px;color:var(--muted);margin-top:2px}
.rating-bar-chart{margin:20px 0}
.rating-bar-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.rating-bar-label{width:40px;font-size:13px;font-weight:600;color:var(--ink-soft)}
.rating-bar-track{flex:1;height:24px;background:var(--rule-light);border-radius:6px;overflow:hidden}
.rating-bar-fill{height:100%;border-radius:6px;transition:width .5s;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:11px;font-weight:600;color:#fff}
.rating-bar-count{width:40px;font-size:13px;font-weight:600;text-align:right}
.feedback-item{padding:16px;border-radius:var(--radius-md);margin-bottom:10px;border-left:4px solid var(--rule)}
.feedback-item.negative{border-left-color:var(--red);background:var(--red-bg)}
.feedback-item.neutral{border-left-color:var(--gold);background:var(--gold-bg)}
.feedback-item.positive{border-left-color:var(--green);background:var(--green-bg)}
.feedback-item .fi-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.feedback-item .fi-rating{font-size:16px;font-weight:700}
.feedback-item .fi-date{font-size:12px;color:var(--muted)}
.feedback-item .fi-content{font-size:14px;color:var(--ink-soft);line-height:1.6}
.feedback-item .fi-action{margin-top:8px;font-size:12px;color:var(--accent);font-weight:600}
.priority-list{padding:0;list-style:none}
.priority-list li{padding:10px 0;font-size:14px;border-bottom:1px solid var(--rule-light);display:flex;align-items:center;gap:8px}
.priority-list li:last-child{border-bottom:none}
.priority-badge{padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700}
.priority-badge.high{background:var(--red-bg);color:var(--red)}
.priority-badge.medium{background:var(--gold-bg);color:var(--gold)}
.priority-badge.low{background:var(--green-bg);color:var(--green)}

</style>
</head>

<h2>📊 输入Feedback数据</h2>
<div class="form-group"><label>Feedback列表 (每行: 评分,日期,内容)</label><textarea id="fbData" rows="8" oninput="analyzeFeedback()">5,2026-07-10,发货速度快,产品质量很好
1,2026-07-08,包装太差,产品被压坏了
4,2026-07-05,整体不错,就是物流有点慢
2,2026-07-03,客服回复太慢,等了3天才回
5,2026-06-28,非常好,会回购
3,2026-06-25,产品一般,价格偏高

<script>
function analyzeFeedback(){
var fbText=document.getElementById('fbData').value.trim();
if(!fbText){document.getElementById('resultArea').innerHTML='<div class="empty-state"><div class="icon">📊</div><p>输入Feedback数据<br>查看分析报告</p></div>';return;}
var feedbacks=[];
fbText.split('\n').forEach(function(line){
line=line.trim();
if(!line)return;
var parts=line.split(',');
if(parts.length>=3){
feedbacks.push({rating:parseInt(parts[0])||0,date:parts[1].trim(),content:parts.slice(2).join(',').trim()});
}
});
if(feedbacks.length===0){document.getElementById('resultArea').innerHTML='<div class="empty-state"><div class="icon">📊</div><p>输入Feedback数据<br>查看分析报告</p></div>';return;}
var total=feedbacks.length;
var avg=(feedbacks.reduce(function(s,f){return s+f.rating;},0)/total).toFixed(1);
var positive=feedbacks.filter(function(f){return f.rating>=4;}).length;
var neutral=feedbacks.filter(function(f){return f.rating===3;}).length;
var negative=feedbacks.filter(function(f){return f.rating<=2;}).length;
var positiveRate=Math.round(positive/total*100);
var ratingCounts=[0,0,0,0,0];
feedbacks.forEach(function(f){if(f.rating>=1&&f.rating<=5)ratingCounts[f.rating-1]++;});
var html='<div class="result-card"><h3 style="font-size:18px;font-weight:700;margin-bottom:16px">📊 Feedback统计分析</h3>';
html+='<div class="feedback-stats">';
html+='<div class="feedback-stat"><div class="fs-num" style="color:var(--accent)">'+total+'</div><div class="fs-label">总Feedback</div></div>';
html+='<div class="feedback-stat"><div class="fs-num" style="color:'+(avg>=4?'var(--green)':avg>=3?'var(--gold)':'var(--red)')+'">'+avg+'</div><div class="fs-label">平均评分</div></div>';
html+='<div class="feedback-stat"><div class="fs-num" style="color:var(--green)">'+positiveRate+'%</div><div class="fs-label">好评率</div></div>';
html+='<div class="feedback-stat"><div class="fs-num" style="color:var(--gold)">'+neutral+'</div><div class="fs-label">中评数</div></div>';
html+='<div class="feedback-stat"><div class="fs-num" style="color:var(--red)">'+negative+'</div><div class="fs-label">差评数</div></div>';
html+='</div>';
html+='<h4 style="font-size:14px;font-weight:600;margin:20px 0 8px">📊 评分分布</h4>';
html+='<div class="rating-bar-chart">';
for(var i=5;i>=1;i--){
var pct=Math.round(ratingCounts[i-1]/total*100);
var color=i>=4?'var(--green)':i===3?'var(--gold)':'var(--red)';
html+='<div class="rating-bar-row"><div class="rating-bar-label">'+i+'星</div>';
html+='<div class="rating-bar-track"><div class="rating-bar-fill" style="width:'+pct+'%;background:'+color+'">'+pct+'%</div></div>';
html+='<div class="rating-bar-count">'+ratingCounts[i-1]+'</div></div>';
}
html+='</div>';
html+='<h4 style="font-size:14px;font-weight:600;margin:20px 0 8px">🔴 负面Feedback优先处理</h4>';
html+='<ul class="priority-list">';
var negativeFbs=feedbacks.filter(function(f){return f.rating<=2;}).sort(function(a,b){return new Date(b.date)-new Date(a.date);});
negativeFbs.forEach(function(f){
var daysAgo=Math.floor((new Date('2026-07-12')-new Date(f.date))/(1000*60*60*24));
var priority=daysAgo<=3?'high':daysAgo<=7?'medium':'low';
var priorityText=daysAgo<=3?'高优先级':daysAgo<=7?'中优先级':'低优先级';
html+='<li><span class="priority-badge '+priority+'">'+priorityText+'</span><span style="flex:1">'+f.content+' ('+f.date+')</span><span style="font-size:12px;color:var(--muted)">'+f.rating+'星</span></li>';
});
if(negativeFbs.length===0)html+='<li style="color:var(--green)">✓ 暂无负面Feedback</li>';
html+='</ul>';
html+='<h4 style="font-size:14px;font-weight:600;margin:20px 0 8px">📝 Feedback详情</h4>';
feedbacks.sort(function(a,b){return new Date(b.date)-new Date(a.date);});
feedbacks.forEach(function(f){
var type=f.rating>=4?'positive':f.rating===3?'neutral':'negative';
var stars='★★★★★'.substring(0,f.rating)+'☆☆☆☆☆'.substring(0,5-f.rating);
var actionText=type==='negative'?'→ 申请移除/联系买家解决':type==='neutral'?'→ 跟进了解具体问题':'→ 感谢买家支持';
html+='<div class="feedback-item '+type+'">';
html+='<div class="fi-header"><span class="fi-rating" style="color:'+(type==='positive'?'var(--green)':type==='neutral'?'var(--gold)':'var(--red)')+'">'+stars+'</span><span class="fi-date">'+f.date+'</span></div>';
html+='<div class="fi-content">"'+f.content+'"</div>';
html+='<div class="fi-action">'+actionText+'</div>';
html+='</div>';
});
html+='<div style="padding:16px;background:var(--accent-bg);border-radius:var(--radius-md);margin-top:16px">';
html+='<h4 style="font-size:14px;font-weight:700;margin-bottom:8px">💡 评分维护策略</h4>';
html+='<div style="font-size:13px;color:var(--ink-soft);line-height:1.8">';
html+='<div>1. 好评率目标≥90%，低于80%需立即干预</div>';
html+='<div>2. 负面Feedback 48小时内响应处理</div>';
html+='<div>3. 可向亚马逊申请移除含人身攻击/促销语言的Feedback</div>';
html+='<div>4. 持续优化产品质量和客服响应速度</div>';
html+='<div>5. 定期分析负面Feedback根因，系统性改进</div>';
html+='</div></div>';
html+='</div>';
document.getElementById('resultArea').innerHTML=html;
var saved=JSON.parse(localStorage.getItem('jx_feedback_mgmt')||'{}');
saved.lastView=Date.now();
saved.total=total;
saved.avg=avg;
saved.negative=negative;
localStorage.setItem('jx_feedback_mgmt',JSON.stringify(saved));
}
analyzeFeedback();

</script>
</body>
</html>
