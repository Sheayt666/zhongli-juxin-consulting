.promo-pattern h4{font-size:13px;font-weight:700;margin-bottom:8px}

</div>

2026-06-05,32.99
2026-06-10,29.99
2026-06-15,29.99

<script>
function analyzePricing(){
var asin=document.getElementById('asin').value.trim();
var myPrice=parseFloat(document.getElementById('myPrice').value)||0;
var histText=document.getElementById('priceHistory').value.trim();
if(!asin||!histText){document.getElementById('resultArea').innerHTML='<div class="empty-state"><div class="icon">💲</div><p>输入竞品价格历史<br>分析定价策略</p></div>';return;}
var history=[];
histText.split('\n').forEach(function(line){
line=line.trim();
if(!line)return;
var parts=line.split(',');
if(parts.length>=2){
history.push({date:parts[0].trim(),price:parseFloat(parts[1])||0});
}
});
if(history.length<2){document.getElementById('resultArea').innerHTML='<div class="empty-state"><div class="icon">💲</div><p>输入竞品价格历史<br>分析定价策略</p></div>';return;}
var prices=history.map(function(h){return h.price;});
var minPrice=Math.min.apply(null,prices);
var maxPrice=Math.max.apply(null,prices);
var avgPrice=(prices.reduce(function(s,p){return s+p;},0)/prices.length).toFixed(2);
var latestPrice=prices[prices.length-1];
var firstPrice=prices[0];
var priceRange=maxPrice-minPrice;
var priceChanges=[];
for(var i=1;i<history.length;i++){
if(prices[i]!==prices[i-1]){
priceChanges.push({date:history[i].date,from:prices[i-1],to:prices[i],change:prices[i]-prices[i-1],pct:((prices[i]-prices[i-1])/prices[i-1]*100).toFixed(1)});
}
}
var promoCount=priceChanges.filter(function(c){return c.change<0;}).length;
var increaseCount=priceChanges.filter(function(c){return c.change>0;}).length;
var avgChangeInterval=Math.round(history.length/(priceChanges.length||1));
var promoPattern='';
if(promoCount>=2){
var promoPrices=priceChanges.filter(function(c){return c.change<0;});
var avgDrop=(promoPrices.reduce(function(s,c){return s+Math.abs(c.change);},0)/promoPrices.length).toFixed(2);
promoPattern='定期降价促销，平均降幅$'+avgDrop+'，约每'+avgChangeInterval+'天调价一次';
}
var priceElasticity=Math.abs(((firstPrice-latestPrice)/firstPrice)*100).toFixed(0);
var elasticityLevel=priceElasticity>=20?'high':priceElasticity>=10?'medium':'low';
var elasticityText=elasticityLevel==='high'?'价格弹性高 - 频繁调价':elasticityLevel==='medium'?'价格弹性中等 - 适度调价':'价格弹性低 - 价格稳定';
var vsMyPrice=latestPrice-myPrice;
var svgW=660,svgH=160,pad=30;
var xStep=(svgW-pad*2)/(history.length-1);
var yMax=maxPrice+2;
var yMin=Math.max(0,minPrice-2);
var yRange=yMax-yMin;
var points=history.map(function(h,i){
var x=pad+i*xStep;
var y=svgH-pad-((h.price-yMin)/yRange*(svgH-pad*2));
return x+','+y;
});
var polyline=points.join(' ');
var html='<div class="result-card"><h3 style="font-size:18px;font-weight:700;margin-bottom:16px">💲 竞品定价策略 — '+asin+'</h3>';
html+='<div class="stat-grid">';
html+='<div class="stat-card"><div class="sc-num accent">$'+latestPrice.toFixed(2)+'</div><div class="sc-label">最新价格</div></div>';
html+='<div class="stat-card"><div class="sc-num gold">$'+avgPrice+'</div><div class="sc-label">平均价格</div></div>';
html+='<div class="stat-card"><div class="sc-num green">$'+minPrice.toFixed(2)+'</div><div class="sc-label">最低价格</div></div>';
html+='<div class="stat-card"><div class="sc-num red">$'+maxPrice.toFixed(2)+'</div><div class="sc-label">最高价格</div></div>';
html+='</div>';
html+='<h4 style="font-size:14px;font-weight:600;margin:16px 0 8px">📈 价格走势图</h4>';
html+='<div class="price-chart"><svg class="price-line-svg" viewBox="0 0 '+svgW+' '+svgH+'">';
for(var gy=0;gy<=4;gy++){
var yVal=yMin+(yRange/4*gy);
var yPos=svgH-pad-(gy/4*(svgH-pad*2));
html+='<line x1="'+pad+'" y1="'+yPos+'" x2="'+(svgW-pad)+'" y2="'+yPos+'" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>';
html+='<text x="'+(pad-8)+'" y="'+(yPos+4)+'" text-anchor="end" font-size="10" fill="#94a3b8">$'+yVal.toFixed(0)+'</text>';
}
html+='<line x1="'+pad+'" y1="'+(svgH-pad)+'" x2="'+(svgW-pad)+'" y2="'+(svgH-pad)+'" stroke="#cbd5e1" stroke-width="2"/>';
html+='<polyline points="'+polyline+'" fill="none" stroke="#4f46e5" stroke-width="2.5" stroke-linejoin="round"/>';
if(myPrice>0){
var myY=svgH-pad-((myPrice-yMin)/yRange*(svgH-pad*2));
html+='<line x1="'+pad+'" y1="'+myY+'" x2="'+(svgW-pad)+'" y2="'+myY+'" stroke="#10b981" stroke-width="2" stroke-dasharray="6,4"/>';
html+='<text x="'+(svgW-pad-4)+'" y="'+(myY-6)+'" text-anchor="end" font-size="10" fill="#10b981" font-weight="600">您的价格 $'+myPrice.toFixed(2)+'</text>';
}
history.forEach(function(h,i){
var cx=pad+i*xStep;
var cy=svgH-pad-((h.price-yMin)/yRange*(svgH-pad*2));
html+='<circle cx="'+cx+'" cy="'+cy+'" r="3" fill="#4f46e5" stroke="#fff" stroke-width="1.5"/>';
});
html+='</svg></div>';
html+='<h4 style="font-size:14px;font-weight:600;margin:16px 0 8px">📋 价格变动记录</h4>';
html+='<table class="price-change-table"><thead><tr><th>日期</th><th>原价</th><th>新价</th><th>变动</th><th>变动幅度</th><th>类型</th></tr></thead><tbody>';
priceChanges.forEach(function(c){
var type=c.change<0?'降价':'涨价';
var cls=c.change<0?'down':'up';
html+='<tr><td>'+c.date+'</td><td>$'+c.from.toFixed(2)+'</td><td>$'+c.to.toFixed(2)+'</td><td><span class="price-change '+cls+'">'+(c.change>0?'+':'')+'$'+c.change.toFixed(2)+'</span></td><td>'+(c.pct>0?'+':'')+c.pct+'%</td><td>'+type+'</td></tr>';
});
html+='</tbody></table>';
html+='<div class="elasticity-card" style="background:var(--accent-bg)"><h4>📊 价格弹性分析</h4>';
html+='<div style="font-size:13px;color:var(--ink-soft);margin-bottom:8px">'+elasticityText+' | 总波动幅度: '+priceElasticity+'%</div>';
html+='<div class="elasticity-meter"><div class="elasticity-fill" style="width:'+priceElasticity+'%;background:'+(elasticityLevel==='high'?'var(--red)':elasticityLevel==='medium'?'var(--gold)':'var(--green)')+'">'+priceElasticity+'%</div></div>';
html+='</div>';
if(promoPattern){
html+='<div class="promo-pattern"><h4>🔔 促销规律识别</h4><p style="font-size:13px;color:#92400e">'+promoPattern+'</p></div>';
}
html+='<div style="padding:16px;background:var(--green-bg);border-radius:var(--radius-md);margin-top:12px"><h4 style="font-size:14px;font-weight:700;color:var(--green);margin-bottom:8px">💡 应对建议</h4><div style="font-size:13px;color:var(--ink-soft);line-height:1.8">';
if(vsMyPrice>0){
html+='<div>竞品最新价格 <strong>$'+latestPrice.toFixed(2)+'</strong> 低于您的价格 <strong>$'+myPrice.toFixed(2)+'</strong> (差$'+Math.abs(vsMyPrice).toFixed(2)+')</div>';
html+='<div>1. 考虑适度降价或增加优惠券缩小价差</div>';
html+='<div>2. 强调产品差异化优势(质量/功能/服务)</div>';
html+='<div>3. 增加捆绑销售提升性价比感知</div>';
}else if(vsMyPrice<0){
html+='<div>您的价格 <strong>$'+myPrice.toFixed(2)+'</strong> 低于竞品 <strong>$'+latestPrice.toFixed(2)+'</strong> (优势$'+Math.abs(vsMyPrice).toFixed(2)+')</div>';
html+='<div>1. 价格优势明显，可考虑适度提价提升利润</div>';
html+='<div>2. 利用价格优势抢占Buy Box</div>';
html+='<div>3. 增加广告投入扩大价格优势的曝光</div>';
}else{
html+='<div>价格与竞品持平，需通过其他维度竞争</div>';
html+='<div>1. 优化Listing转化率</div>';
html+='<div>2. 增加A+内容和视频提升品牌感知</div>';
html+='<div>3. 优化评价数量和质量</div>';
}
if(promoPattern){
html+='<div>4. 竞品有定期促销规律，建议在其促销期加大广告投入拦截流量</div>';
}
html+='</div></div>';
html+='</div>';
document.getElementById('resultArea').innerHTML=html;
var saved=JSON.parse(localStorage.getItem('jx_pricing_strategy')||'[]');
saved.unshift({asin:asin,latest:latestPrice,myPrice:myPrice,elasticity:elasticityLevel,time:Date.now()});
if(saved.length>20)saved=saved.slice(0,20);
localStorage.setItem('jx_pricing_strategy',JSON.stringify(saved));
}
analyzePricing();
