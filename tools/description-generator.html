<script>
var DG={
currentTab:'seo',
calc:function(){
this.render();
},
switchTab:function(tab){
this.currentTab=tab;
document.querySelectorAll('.desc-tab-btn').forEach(function(b,i){b.classList.toggle('active',['seo','brand','feature'][i]===tab)});
this.render();
},
render:function(){
var name=document.getElementById('prodName').value;
var brand=document.getElementById('brand').value;
var points=document.getElementById('sellingPoints').value.split('\n').filter(function(p){return p.trim()});
var story=document.getElementById('brandStory').value;
var audience=document.getElementById('targetAudience').value;
var useCase=document.getElementById('useCase').value;
var html='';
if(this.currentTab==='seo'){
html='<h2>'+name+' by '+brand+' - Premium Hydration Solution</h2>';
html+='<p>Discover the ultimate <strong>'+name.toLowerCase()+'</strong> designed for '+audience+'. Whether you\'re at the '+useCase+', our premium bottle delivers exceptional performance and style.</p>';
html+='<h3>Key Features & Benefits</h3><ul>';
points.forEach(function(p){var parts=p.split(/[-:]/);html+='<li><strong>'+(parts[0]||p).trim()+':</strong> '+(parts[1]||'').trim()+'</li>'});
html+='</ul>';
html+='<h3>Why Choose '+brand+'?</h3><p>Our '+name.toLowerCase()+' combines premium materials with innovative design. The <strong>double wall vacuum insulation</strong> technology ensures your beverages stay at the perfect temperature, while the <strong>leak-proof lid</strong> gives you peace of mind wherever you go.</p>';
html+='<h3>Perfect for Every Lifestyle</h3><p>Designed for '+audience+', this versatile bottle is your ideal companion for '+useCase+'. The <strong>sweat-free exterior</strong> keeps your hands dry, and the <strong>wide mouth design</strong> makes filling and cleaning effortless.</p>';
html+='<p><strong>Upgrade your hydration experience today with '+brand+' '+name+'!</strong></p>';
}else if(this.currentTab==='brand'){
html='<h2>The Story Behind '+brand+'</h2>';
html+='<p>'+story+'</p>';
html+='<h3>Our Promise</h3><p>Every '+name+' we create is a testament to our commitment to quality, sustainability, and your active lifestyle. We don\'t just make water bottles - we craft companions for your daily adventures.</p>';
html+='<h3>Crafted with Purpose</h3><ul>';
points.forEach(function(p){html+='<li>'+p+'</li>'});
html+='</ul>';
html+='<h3>More Than a Bottle</h3><p>When you choose '+brand+', you\'re joining a community of '+audience+' who refuse to compromise on quality. From '+useCase+', our '+name.toLowerCase()+' is there for every moment that matters.</p>';
html+='<p><strong>Join the '+brand+' family. Hydrate with purpose.</strong></p>';
}else{
html='<h2>'+name+' - Technical Specifications</h2>';
html+='<h3>Product Overview</h3><p>The '+brand+' '+name.toLowerCase()+' is engineered for '+audience+' who demand performance and reliability.</p>';
html+='<h3>Technical Features</h3><ul>';
points.forEach(function(p){
var parts=p.split(/[-:]/);
var feat=(parts[0]||p).trim();
var desc=(parts[1]||'').trim();
html+='<li><strong>'+feat+'</strong>'+(desc?': '+desc:'')+'</li>';
});
html+='</ul>';
html+='<h3>Applications</h3><p>Suitable for: '+useCase+'</p>';
html+='<h3>Quality Assurance</h3><p>Manufactured with premium 18/8 stainless steel. BPA-free, food-grade materials. Rigorously tested for durability and safety.</p>';
html+='<p><strong>Specifications:</strong> 20oz capacity | Vacuum insulated | Leak-proof | Sweat-free</p>';
}
document.getElementById('descOutput').innerHTML=html;
document.getElementById('htmlSource').innerHTML='<code>'+html.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</code>';
},
copyHTML:function(){
var range=document.createRange();
range.selectNode(document.getElementById('htmlSource'));
var sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
document.execCommand('copy');
alert('HTML代码已复制到剪贴板！');
}
};
DG.calc();
</script>
