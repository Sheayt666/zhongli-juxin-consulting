</div></section>
<script>
var VCC={
calc:function(){
var vType=document.getElementById('varType').value;
var vCount=parseInt(document.getElementById('varCount').value)||0;
var cat=document.getElementById('category').value;
var attrs=document.getElementById('varAttributes').value.split('\n').filter(function(a){return a.trim()});
var asins=document.getElementById('asinList').value.split(',').filter(function(a){return a.trim()});
var pDiff=parseFloat(document.getElementById('priceDiff').value)||0;
var sameImg=document.getElementById('sameMainImage').value==='1';
var validTypes={color:['Apparel','Kitchen','Beauty','Home','Sports'],size:['Apparel','Kitchen','Home','Sports'],color_size:['Apparel','Home'],style:['Kitchen','Home','Electronics','Sports'],material:['Kitchen','Home','Beauty'],scent:['Beauty','Home'],flavor:['Beauty']};
var checks=[];
var passCount=0,failCount=0,warnCount=0;
var typeOk=validTypes[vType]?validTypes[vType].indexOf(cat)>=0:false;
if(typeOk){checks.push({type:'pass',text:'变体类型<strong>'+vType+'</strong>在<strong>'+cat+'</strong>类目下允许使用'});passCount++}
else{checks.push({type:'fail',text:'变体类型<strong>'+vType+'</strong>在<strong>'+cat+'</strong>类目下<strong>不允许</strong>使用，可能被拆分'});failCount++}
if(attrs.length===vCount){checks.push({type:'pass',text:'变体属性数量（'+attrs.length+'）与变体数量（'+vCount+'）匹配'});passCount++}
else{checks.push({type:'fail',text:'变体属性数量（'+attrs.length+'）与变体数量（'+vCount+'）<strong>不匹配</strong>'});failCount++}
if(asins.length===vCount){checks.push({type:'pass',text:'ASIN数量（'+asins.length+'）与变体数量匹配'});passCount++}
else{checks.push({type:'warn',text:'ASIN数量（'+asins.length+'）与变体数量（'+vCount+'）不完全匹配'});warnCount++}
if(vCount<=30){checks.push({type:'pass',text:'变体数量'+vCount+'≤30，在合理范围内'});passCount++}
else{checks.push({type:'fail',text:'变体数量'+vCount+'>30，超出Amazon建议上限'});failCount++}
if(vCount>=2){checks.push({type:'pass',text:'变体数≥2，符合最低变体要求'});passCount++}
else{checks.push({type:'warn',text:'变体数<2，不构成有效变体组'});warnCount++}
if(pDiff<=50){checks.push({type:'pass',text:'价格差异'+pDiff+'%在合理范围内（≤50%）'});passCount++}
else{checks.push({type:'warn',text:'价格差异'+pDiff+'%较大（>50%），可能触发变体价格差异审查'});warnCount++}
if(sameImg){checks.push({type:'pass',text:'主图风格统一，符合变体图片规范'});passCount++}
else{checks.push({type:'fail',text:'主图不统一，违反变体图片规范——所有变体主图背景/风格须一致'});failCount++}
if(vType==='color_size'&&vCount<=6){checks.push({type:'pass',text:'Color+Size组合变体数合理'});passCount++}
else if(vType==='color_size'){checks.push({type:'warn',text:'Color+Size组合变体数较多，建议控制在6个以内'});warnCount++}
var dupAttrs=attrs.filter(function(a,i){return attrs.indexOf(a)!==i});
if(!dupAttrs.length){checks.push({type:'pass',text:'无重复变体属性'});passCount++}
else{checks.push({type:'fail',text:'存在重复变体属性：'+dupAttrs.join(', ')});failCount++}
var cl=document.getElementById('checkList');cl.innerHTML='';
checks.forEach(function(c){
cl.innerHTML+='<li class="check-item"><div class="ci-icon ci-'+c.type+'">'+(c.type==='pass'?'✓':c.type==='warn'?'!':'✗')+'</div><div class="ci-text">'+c.text+'</div></li>';
});
var total=checks.length;
var score=Math.round((passCount+warnCount*0.5)/total*100);
document.getElementById('passCount').textContent=passCount;
document.getElementById('failCount').textContent=failCount;
document.getElementById('warnCount').textContent=warnCount;
document.getElementById('complianceScore').textContent=score+'%';
document.getElementById('complianceScore').style.color=score>=80?'#10b981':score>=50?'#f59e0b':'#ef4444';
var sl=document.getElementById('suggestList');sl.innerHTML='';
if(failCount>0){sl.innerHTML+='<div class="suggest-card split"><div style="font-size:24px">⚠️</div><div><h4 style="font-size:14px;font-weight:700;margin-bottom:4px">建议修正变体设置</h4><p style="font-size:13px;color:#334155">检测到'+failCount+'项不合规问题。建议：1) 确认变体类型在当前类目下被允许；2) 统一主图风格；3) 确保属性无重复；4) ASIN数量与变体数量匹配。修正后重新提交变体关系。</p></div></div>';}
if(score>=80){sl.innerHTML+='<div class="suggest-card merge"><div style="font-size:24px">✅</div><div><h4 style="font-size:14px;font-weight:700;margin-bottom:4px">变体设置合规</h4><p style="font-size:13px;color:#334155">变体设置合规评分'+score+'%，可以安全合并。建议保持当前变体结构，定期检查变体评论和评分分布。</p></div></div>';}
if(pDiff>30){sl.innerHTML+='<div class="suggest-card split"><div style="font-size:24px">💰</div><div><h4 style="font-size:14px;font-weight:700;margin-bottom:4px">价格差异较大</h4><p style="font-size:13px;color:#334155">变体间价格差异'+pDiff+'%，Amazon可能认为这些产品不是真正的变体。建议控制价格差异在30%以内，或将高价位产品单独拆分为独立Listing。</p></div></div>';}
if(vCount>10){sl.innerHTML+='<div class="suggest-card split"><div style="font-size:24px">📊</div><div><h4 style="font-size:14px;font-weight:700;margin-bottom:4px">变体数较多</h4><p style="font-size:13px;color:#334155">'+vCount+'个变体可能影响买家选择体验。建议按子类目或价格区间拆分为2-3个变体组，每组5-6个变体。</p></div></div>';}
}
};
VCC.calc();
</script>
