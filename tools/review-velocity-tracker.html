<head>

<title>评论增速追踪器 - 日均评论率与里程碑预估工具</title>
<style>
:root{--bg:#ffffff;--bg-soft:#f8fafc;--surface:#ffffff;--ink:#0f172a;--ink-soft:#334155;--muted:#64748b;--muted-light:#94a3b8;--rule:#e2e8f0;--rule-light:#f1f5f9;--accent:#4f46e5;--accent-dark:#4338ca;--accent-bg:#eef2ff;--green:#10b981;--green-bg:#ecfdf5;--gold:#f59e0b;--gold-bg:#fffbeb;--red:#ef4444;--red-bg:#fef2f2;--cyan:#0891b2;--cyan-bg:#ecfeff;--shadow-sm:0 1px 2px rgba(0,0,0,0.05);--shadow-md:0 4px 6px -1px rgba(0,0,0,0.07),0 2px 4px -2px rgba(0,0,0,0.05);--shadow-lg:0 10px 15px -3px rgba(0,0,0,0.08),0 4px 6px -4px rgba(0,0,0,0.04);--shadow-xl:0 20px 25px -5px rgba(0,0,0,0.08),0 8px 10px -6px rgba(0,0,0,0.04);--radius-sm:8px;--radius-md:12px;--radius-lg:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg-soft);color:var(--ink);line-height:1.6;font-size:15px;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none;transition:color .2s}
.container{max-width:1152px;margin:0 auto;padding:0 24px}
.top-nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--rule);padding:14px 0}
.top-nav-inner{display:flex;align-items:center;justify-content:space-between}
.top-nav-logo{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:700;color:var(--ink)}
.top-nav-logo .logo-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#6366f1);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px}
.top-nav-links{display:flex;gap:28px;list-style:none}
.top-nav-links a{color:var(--ink-soft);font-size:14px;font-weight:500}
.top-nav-links a:hover{color:var(--accent)}
.workflow-nav{background:linear-gradient(135deg,#f8f9ff 0%,#f0f4ff 100%);border:1px solid #e0e7ff;border-radius:16px;padding:20px 24px;margin:24px auto;max-width:1152px;overflow-x:auto}
.workflow-nav-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:14px}
.workflow-nav-header .workflow-icon{font-size:18px}
.workflow-nav-header .workflow-name{font-weight:600;color:var(--accent)}
.workflow-nav-steps{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.workflow-nav-steps .step{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;background:#fff;border:1px solid #e0e7ff;color:var(--accent);text-decoration:none;transition:all .2s;white-space:nowrap}
.workflow-nav-steps .step:hover{background:var(--accent);color:#fff;transform:translateY(-1px)}
.workflow-nav-steps .step.current{background:var(--accent);color:#fff;font-weight:600}
.workflow-nav-steps .arrow{color:#c7d2fe;font-size:13px}
.breadcrumb{padding:12px 0;font-size:13px;color:var(--muted)}
.breadcrumb a{color:var(--muted)}.breadcrumb a:hover{color:var(--accent)}
.breadcrumb .sep{margin:0 6px;color:var(--rule)}.breadcrumb .current{color:var(--ink);font-weight:500}
.tool-hero{background:linear-gradient(135deg,#eef2ff 0%,#f5f3ff 50%,#fffbeb 100%);padding:48px 0 40px;text-align:center}
.tool-hero-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;background:rgba(255,255,255,.9);border:1px solid rgba(79,70,229,.2);border-radius:50px;font-size:13px;color:var(--accent);font-weight:600;margin-bottom:20px}
.tool-hero h1{font-size:clamp(28px,4vw,42px);font-weight:800;margin-bottom:14px;color:var(--ink)}
.tool-hero h1 em{font-style:normal;background:linear-gradient(135deg,var(--accent),#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tool-hero-desc{font-size:16px;color:var(--muted);max-width:600px;margin:0 auto}
.tool-section{padding:40px 0 60px}
.input-card{background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius-lg);padding:28px;box-shadow:var(--shadow-md);margin-bottom:24px}
.input-card h2{font-size:18px;font-weight:700;margin-bottom:16px;color:var(--ink)}
.form-group{margin-bottom:16px}.form-group label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 16px;border:1px solid var(--rule);border-radius:var(--radius-sm);font-size:14px;color:var(--ink);background:#fff;transition:border-color .2s,box-shadow .2s;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.result-area{margin-top:24px}
.result-card{background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius-lg);padding:28px;box-shadow:var(--shadow-md);margin-bottom:16px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin:20px 0}
.stat-card{padding:18px;border-radius:var(--radius-md);text-align:center;background:var(--bg-soft);border:1px solid var(--rule-light)}
.stat-card .sc-num{font-size:26px;font-weight:800;color:var(--accent)}
.stat-card .sc-num.green{color:var(--green)}.stat-card .sc-num.red{color:var(--red)}.stat-card .sc-num.gold{color:var(--gold)}
.stat-card .sc-label{font-size:12px;color:var(--muted);margin-top:4px}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}.empty-state .icon{font-size:48px;margin-bottom:12px}
.related-tools{background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius-lg);padding:28px;margin-top:32px}
.related-tools h3{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--ink)}
.related-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.related-card{display:flex;gap:10px;padding:14px;background:var(--bg-soft);border-radius:var(--radius-sm);text-decoration:none;transition:all .2s}
.related-card:hover{background:var(--accent-bg);transform:translateX(4px)}
.related-card .ricon{font-size:20px;flex-shrink:0}.related-card .rtext{font-size:13px;font-weight:500;color:var(--ink-soft)}
.back-link{text-align:center;margin-top:32px}
.back-link a{display:inline-flex;align-items:center;gap:8px;padding:12px 32px;border-radius:50px;font-size:14px;font-weight:600;background:linear-gradient(135deg,var(--accent),#6366f1);color:#fff;box-shadow:0 4px 14px rgba(79,70,229,.3);transition:all .2s}
.back-link a:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(79,70,229,.4)}
footer{background:#0f172a;color:rgba(255,255,255,.5);padding:32px 0;text-align:center;font-size:13px;margin-top:40px}
@media(max-width:768px){.form-row,.form-row-3{grid-template-columns:1fr}.top-nav-links{display:none}}

.velocity-chart{height:200px;display:flex;align-items:flex-end;gap:3px;padding:16px;background:var(--bg-soft);border-radius:var(--radius-md);margin:20px 0;border-bottom:2px solid var(--rule);position:relative}
.v-bar{flex:1;border-radius:4px 4px 0 0;transition:height .3s;min-height:4px;position:relative;cursor:pointer}
.v-bar.self{background:linear-gradient(180deg,var(--accent),#818cf8)}
.v-bar.comp{background:linear-gradient(180deg,var(--gold),#fbbf24);opacity:.6}
.v-bar:hover::after{content:attr(data-info);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:4px 8px;border-radius:4px;font-size:10px;white-space:nowrap;margin-bottom:4px;z-index:10}
.velocity-legend{display:flex;gap:20px;font-size:12px;color:var(--muted);margin-top:8px;padding:0 16px}
.velocity-legend .vl-item{display:flex;align-items:center;gap:6px}
.velocity-legend .vl-dot{width:12px;height:12px;border-radius:3px}
.milestone-chart{margin:20px 0}
.milestone-track{height:40px;background:var(--rule-light);border-radius:20px;position:relative;overflow:hidden;margin:12px 0}
.milestone-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:20px;transition:width .5s;display:flex;align-items:center;justify-content:flex-end;padding-right:12px;color:#fff;font-size:13px;font-weight:700}
.comparison-table{width:100%;border-collapse:collapse;margin-top:16px}
.comparison-table th{background:var(--accent-bg);color:var(--accent);padding:12px;text-align:left;font-size:12px;font-weight:700}
.comparison-table td{padding:12px;border-bottom:1px solid var(--rule-light);font-size:13px}
.comparison-table tr.highlight{background:var(--green-bg)}

</style>
</head>
<body>
<nav class="top-nav">
<div class="container top-nav-inner">

<div class="workflow-nav container"><div class="workflow-nav-header"><span class="workflow-icon">👥</span><span class="workflow-name">客户运营工作流</span></div><div class="workflow-nav-steps"><a href="variation-strategy.html" class="step">变体策略</a><span class="arrow">→</span><a href="listing-split-test.html" class="step">Listing测试</a><span class="arrow">→</span><a href="refund-rate-calculator.html" class="step">退款率</a><span class="arrow">→</span><a href="customer-ltv.html" class="step">客户LTV</a><span class="arrow">→</span><a href="review-response-generator.html" class="step">评论回复</a><span class="arrow">→</span><a href="review-request-automation.html" class="step">索评自动化</a><span class="arrow">→</span><a href="negative-review-alert-system.html" class="step">差评预警</a><span class="arrow">→</span><a href="buyer-message-manager.html" class="step">站内信</a><span class="arrow">→</span><a href="feedback-management-system.html" class="step">Feedback管理</a><span class="arrow">→</span><a href="customer-journey-mapper.html" class="step">客户旅程</a><span class="arrow">→</span><a href="review-velocity-tracker.html" class="step current">评论增速</a><span class="arrow">→</span><a href="post-purchase-engagement.html" class="step">购后互动</a></div></div>
<main class="tool-section"><div class="container">

<div class="input-card">
<h2>📈 评论增速追踪</h2>
<div class="form-row">
<div class="form-group"><label>ASIN</label><input type="text" id="asin" value="B08XYZ1234" oninput="trackVelocity()"></div>
<div class="form-group"><label>上架天数</label><input type="number" id="days" value="90" min="1" oninput="trackVelocity()"></div>
</div>
<div class="form-row">
<div class="form-group"><label>当前评论数</label><input type="number" id="reviewCount" value="47" min="0" oninput="trackVelocity()"></div>
<div class="form-group"><label>竞品ASIN评论数</label><input type="number" id="compCount" value="120" min="0" oninput="trackVelocity()"></div>
</div>
<div class="form-row">
<div class="form-group"><label>竞品上架天数</label><input type="number" id="compDays" value="180" min="1" oninput="trackVelocity()"></div>
<div class="form-group"><label>类目平均100评论天数</label><input type="number" id="catAvgDays" value="120" min="1" oninput="trackVelocity()"></div>
</div>
</div>
<div class="result-area" id="resultArea"></div>

<div class="related-tools"><h3>🔗 相关工具</h3><div class="related-grid"><a href="review-request-automation.html" class="related-card"><span class="ricon">⭐</span><span class="rtext">索评自动化</span></a><a href="negative-review-alert-system.html" class="related-card"><span class="ricon">🚨</span><span class="rtext">差评预警系统</span></a><a href="feedback-management-system.html" class="related-card"><span class="ricon">📊</span><span class="rtext">Feedback管理</span></a><a href="customer-journey-mapper.html" class="related-card"><span class="ricon">🗺️</span><span class="rtext">客户旅程地图</span></a><a href="post-purchase-engagement.html" class="related-card"><span class="ricon">🎁</span><span class="rtext">购后互动引擎</span></a></div></div>
<div class="back-link"><a href="index.html">← 返回工具中心</a></div>
</div></main>
<footer><div class="container">© 2026 众力聚鑫咨询 — 跨境卖家工具站</div></footer>
<script>
function trackVelocity(){
var asin=document.getElementById('asin').value.trim();
var days=parseInt(document.getElementById('days').value)||0;
var reviewCount=parseInt(document.getElementById('reviewCount').value)||0;
var compCount=parseInt(document.getElementById('compCount').value)||0;
var compDays=parseInt(document.getElementById('compDays').value)||0;
var catAvgDays=parseInt(document.getElementById('catAvgDays').value)||120;
if(!asin||days<=0){document.getElementById('resultArea').innerHTML='<div class="empty-state"><div class="icon">📈</div><p>输入ASIN和评论数据<br>追踪评论增速</p></div>';return;}
var dailyRate=(reviewCount/days).toFixed(2);
var weeklyRate=(reviewCount/days*7).toFixed(1);
var monthlyRate=Math.round(reviewCount/days*30);
var compDailyRate=compDays>0?(compCount/compDays).toFixed(2):0;
var compWeeklyRate=compDays>0?(compCount/compDays*7).toFixed(1):0;
var daysTo100=Math.ceil((100-reviewCount)/(reviewCount/days));
var milestonePct=Math.round(reviewCount/100*100);
var est100Date=new Date();
est100Date.setDate(est100Date.getDate()+daysTo100);
var vsComp=(dailyRate/compDailyRate*100).toFixed(0);
var html='<div class="result-card"><h3 style="font-size:18px;font-weight:700;margin-bottom:16px">📈 评论增速分析 — '+asin+'</h3>';
html+='<div class="stat-grid">';
html+='<div class="stat-card"><div class="sc-num accent">'+dailyRate+'</div><div class="sc-label">日均评论率</div></div>';
html+='<div class="stat-card"><div class="sc-num green">'+weeklyRate+'</div><div class="sc-label">周均评论数</div></div>';
html+='<div class="stat-card"><div class="sc-num gold">'+monthlyRate+'</div><div class="sc-label">月均评论数</div></div>';
html+='<div class="stat-card"><div class="sc-num '+(vsComp>=100?'green':'red')+'">'+vsComp+'%</div><div class="sc-label">vs竞品增速</div></div>';
html+='</div>';
html+='<h4 style="font-size:14px;font-weight:600;margin:20px 0 8px">📊 增速对比曲线 (近12周)</h4>';
html+='<div class="velocity-chart">';
var maxVal=Math.max(weeklyRate,compWeeklyRate,1);
for(var w=0;w<12;w++){
var selfH=Math.round((weeklyRate*(0.6+w*0.035))/maxVal*180);
var compH=Math.round((compWeeklyRate*(0.7+w*0.025))/maxVal*180);
html+='<div style="flex:1;display:flex;gap:2px;align-items:flex-end;height:100%">';
html+='<div class="v-bar self" style="width:50%;height:'+selfH+'px" data-info="第'+(w+1)+'周: '+Math.round(weeklyRate*(0.6+w*0.035)*10)/10+'条"></div>';
html+='<div class="v-bar comp" style="width:50%;height:'+compH+'px" data-info="竞品第'+(w+1)+'周: '+Math.round(compWeeklyRate*(0.7+w*0.025)*10)/10+'条"></div>';
html+='</div>';
}
html+='</div>';
html+='<div class="velocity-legend"><div class="vl-item"><div class="vl-dot" style="background:var(--accent)"></div>本品</div><div class="vl-item"><div class="vl-dot" style="background:var(--gold);opacity:.6"></div>竞品</div></div>';
html+='<h4 style="font-size:14px;font-weight:600;margin:20px 0 8px">🎯 100评论里程碑</h4>';
html+='<div class="milestone-chart">';
html+='<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>当前: '+reviewCount+'条</span><span>目标: 100条</span></div>';
html+='<div class="milestone-track"><div class="milestone-fill" style="width:'+Math.min(milestonePct,100)+'%">'+milestonePct+'%</div></div>';
html+='<div style="font-size:13px;color:var(--muted);margin-top:8px">按当前增速，预计还需 <strong style="color:var(--accent)">'+daysTo100+'天</strong> 达到100评论里程碑 (约'+est100Date.toISOString().slice(0,10)+')</div>';
html+='</div>';
html+='<h4 style="font-size:14px;font-weight:600;margin:20px 0 8px">📋 竞品对比</h4>';
html+='<table class="comparison-table"><thead><tr><th>指标</th><th>本品</th><th>竞品</th><th>差距</th></tr></thead><tbody>';
html+='<tr><td>评论总数</td><td>'+reviewCount+'</td><td>'+compCount+'</td><td style="color:'+(reviewCount>=compCount?'var(--green)':'var(--red)')+'">'+(compCount-reviewCount>0?'-':'+'')+Math.abs(compCount-reviewCount)+'</td></tr>';
html+='<tr><td>日均评论率</td><td>'+dailyRate+'</td><td>'+compDailyRate+'</td><td style="color:'+(dailyRate>=compDailyRate?'var(--green)':'var(--red)')+'">'+(dailyRate>=compDailyRate?'+':'')+(dailyRate-compDailyRate).toFixed(2)+'</td></tr>';
html+='<tr><td>周均评论数</td><td>'+weeklyRate+'</td><td>'+compWeeklyRate+'</td><td style="color:'+(weeklyRate>=compWeeklyRate?'var(--green)':'var(--red)')+'">'+(weeklyRate>=compWeeklyRate?'+':'')+(weeklyRate-compWeeklyRate).toFixed(1)+'</td></tr>';
html+='<tr><td>上架天数</td><td>'+days+'天</td><td>'+compDays+'天</td><td>'+(compDays-days>0?'-':'+')+Math.abs(compDays-days)+'天</td></tr>';
html+='</tbody></table>';
var status='';
if(dailyRate>=0.8){status='增速优秀，超越类目平均水平';}
else if(dailyRate>=0.5){status='增速良好，接近类目平均水平';}
else if(dailyRate>=0.3){status='增速一般，建议优化索评策略';}
else{status='增速偏慢，需加强索评和客户互动';}
var estDays100=Math.ceil(100/(reviewCount/days));
var vsCatAvg=estDays100<catAvgDays?'快于':'慢于';
html+='<div style="padding:16px;background:var(--accent-bg);border-radius:var(--radius-md);margin-top:16px">';
html+='<h4 style="font-size:14px;font-weight:700;margin-bottom:8px">💡 增速诊断</h4>';
html+='<div style="font-size:13px;color:var(--ink-soft);line-height:1.8">';
html+='<div>'+status+'</div>';
html+='<div>预计100评论天数: <strong>'+estDays100+'天</strong> ('+vsCatAvg+'类目平均'+catAvgDays+'天)</div>';
html+='<div>建议: '+(dailyRate<0.5?'启用Request a Review批量索评，优化购后互动流程':dailyRate<0.8?'保持当前节奏，尝试A/B测试索评时机':'增速优秀，关注评论质量和差评率')+'</div>';
html+='</div></div>';
html+='</div>';
document.getElementById('resultArea').innerHTML=html;
var saved=JSON.parse(localStorage.getItem('jx_review_velocity')||'{}');
saved.lastView=Date.now();
saved.asin=asin;
saved.dailyRate=dailyRate;
saved.reviewCount=reviewCount;
localStorage.setItem('jx_review_velocity',JSON.stringify(saved));
}
trackVelocity();

</script>
</body>
</html>
