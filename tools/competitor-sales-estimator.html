<style>
:root{--bg:#ffffff;--bg-soft:#f8fafc;--surface:#ffffff;--ink:#0f172a;--ink-soft:#334155;--muted:#64748b;--muted-light:#94a3b8;--rule:#e2e8f0;--rule-light:#f1f5f9;--accent:#4f46e5;--accent-dark:#4338ca;--accent-bg:#eef2ff;--green:#10b981;--green-bg:#ecfdf5;--gold:#f59e0b;--gold-bg:#fffbeb;--red:#ef4444;--red-bg:#fef2f2;--cyan:#0891b2;--cyan-bg:#ecfeff;--shadow-sm:0 1px 2px rgba(0,0,0,0.05);--shadow-md:0 4px 6px -1px rgba(0,0,0,0.07),0 2px 4px -2px rgba(0,0,0,0.05);--shadow-lg:0 10px 15px -3px rgba(0,0,0,0.08),0 4px 6px -4px rgba(0,0,0,0.04);--shadow-xl:0 20px 25px -5px rgba(0,0,0,0.08),0 8px 10px -6px rgba(0,0,0,0.04);--radius-sm:8px;--radius-md:12px;--radius-lg:16px}

.model-card.best{border-color:var(--green);background:var(--green-bg)}
.model-card .mc-name{font-size:13px;font-weight:700;margin-bottom:6px}
.model-card .mc-daily{font-size:24px;font-weight:800;color:var(--accent)}
.model-card .mc-monthly{font-size:14px;color:var(--muted);margin-top:4px}

.sales-trend-chart{height:160px;display:flex;align-items:flex-end;gap:4px;padding:16px;background:var(--bg-soft);border-radius:var(--radius-md);margin:16px 0;border-bottom:2px solid var(--rule)}
.sales-bar{flex:1;border-radius:4px 4px 0 0;min-height:4px;position:relative;cursor:pointer;transition:height .3s}
.sales-bar:hover::after{content:attr(data-info);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:4px 8px;border-radius:4px;font-size:10px;white-space:nowrap;margin-bottom:4px;z-index:10}

.ci-bar{height:20px;background:var(--rule-light);border-radius:10px;position:relative;margin:8px 0;overflow:hidden}
.ci-fill{position:absolute;height:100%;background:linear-gradient(90deg,var(--gold),var(--green),var(--gold));border-radius:10px}
.ci-marker{position:absolute;top:-4px;width:2px;height:28px;background:var(--accent)}

</style>

<div class="form-group"><label>竞品ASIN</label><input type="text" id="asin" value="B08XYZ1234" oninput="estimateSales()"></div>
<div class="form-group"><label>BSR排名</label><input type="number" id="bsr" value="1250" min="1" oninput="estimateSales()"></div>
<div class="form-group"><label>售价 ($)</label><input type="number" id="price" value="29.99" step="0.01" oninput="estimateSales()"></div>
</div>
<div class="form-row">
<div class="form-group"><label>类目</label><select id="category" onchange="estimateSales()"><option value="electronics">电子电器</option><option value="beauty">美妆个护</option><option value="home">家居厨房</option><option value="toys">玩具游戏</option><option value="textile">服装鞋包</option></select></div>
<div class="form-group"><label>促销状态</label><select id="promo" onchange="estimateSales()"><option value="none">无促销</option><option value="coupon">优惠券</option><option value="lightning">秒杀</option><option value="deal">Deal活动</option></select></div>

<script>
var CATEGORY_PARAMS={
electronics:{a:8500,b:0.62,baseSales:15},
beauty:{a:6200,b:0.58,baseSales:12},
home:{a:5500,b:0.60,baseSales:10},
toys:{a:4800,b:0.55,baseSales:8},
textile:{a:4200,b:0.52,baseSales:7}
};
function estimateSales(){
var asin=document.getElementById('asin').value.trim();
var bsr=parseInt(document.getElementById('bsr').value)||0;
var price=parseFloat(document.getElementById('price').value)||0;
var cat=document.getElementById('category').value;
var promo=document.getElementById('promo').value;
if(!asin||bsr<=0){document.getElementById('resultArea').innerHTML='<div class="empty-state"><div class="icon">📊</div><p>输入竞品BSR和类目<br>估算销量</p></div>';return;}
var params=CATEGORY_PARAMS[cat]||CATEGORY_PARAMS.electronics;
var linearDaily=Math.round(params.a/Math.pow(bsr,0)+params.baseSales);
linearDaily=Math.round(params.a/Math.max(bsr,1)*100+params.baseSales);
linearDaily=Math.max(linearDaily,1);
if(bsr>500)linearDaily=Math.round(params.a/Math.sqrt(bsr)*3+params.baseSales);
if(bsr>2000)linearDaily=Math.round(params.a/Math.sqrt(bsr)*2.5+params.baseSales);
if(bsr>5000)linearDaily=Math.round(params.a/Math.sqrt(bsr)*2+params.baseSales);
if(bsr>10000)linearDaily=Math.round(params.a/Math.sqrt(bsr)*1.5+5);
var logDaily=Math.round(params.a/Math.log(bsr+1)*4+params.baseSales);
var powerDaily=Math.round(params.a*Math.pow(bsr,-0.55)*10+params.baseSales);
logDaily=Math.max(logDaily,1);
powerDaily=Math.max(powerDaily,1);
var promoMultiplier=1;
var promoText='';
if(promo==='coupon'){promoMultiplier=1.15;promoText=' 优惠券+15%';}
else if(promo==='lightning'){promoMultiplier=2.5;promoText=' 秒杀+150%';}
else if(promo==='deal'){promoMultiplier=1.8;promoText=' Deal+80%';}
var baseDaily=Math.round((linearDaily+logDaily+powerDaily)/3);
var adjustedDaily=Math.round(baseDaily*promoMultiplier);
var monthlySales=adjustedDaily*30;
var revenue=monthlySales*price;
var avgDaily=Math.round((linearDaily+logDaily+powerDaily)/3*promoMultiplier);
var ciLow=Math.round(adjustedDaily*0.7);
var ciHigh=Math.round(adjustedDaily*1.3);
var bestModel=linearDaily>=logDaily&&linearDaily>=powerDaily?'linear':logDaily>=powerDaily?'log':'power';
var html='<div class="result-card"><h3 style="font-size:18px;font-weight:700;margin-bottom:16px">📊 竞品销量估算 — '+asin+'</h3>';
html+='<div class="stat-grid">';
html+='<div class="stat-card"><div class="sc-num accent">'+adjustedDaily+'</div><div class="sc-label">日均销量'+promoText+'</div></div>';
html+='<div class="stat-card"><div class="sc-num green">'+monthlySales.toLocaleString()+'</div><div class="sc-label">月销量</div></div>';
html+='<div class="stat-card"><div class="sc-num gold">$'+revenue.toLocaleString()+'</div><div class="sc-label">月销售额</div></div>';
html+='<div class="stat-card"><div class="sc-num">'+ciLow+'~'+ciHigh+'</div><div class="sc-label">日销置信区间</div></div>';
html+='</div>';
html+='<h4 style="font-size:14px;font-weight:600;margin:16px 0 8px">📊 多模型估算对比</h4>';
html+='<div class="model-comparison">';
html+='<div class="model-card '+(bestModel==='linear'?'best':'')+'"><div class="mc-name">线性模型</div><div class="mc-daily">'+Math.round(linearDaily*promoMultiplier)+'</div><div class="mc-monthly">/天</div><div class="mc-tag" style="background:'+(bestModel==='linear'?'var(--green-bg)':'var(--rule-light)')+';color:'+(bestModel==='linear'?'var(--green)':'var(--muted)')+'">'+(bestModel==='linear'?'推荐':'参考')+'</div></div>';
html+='<div class="model-card '+(bestModel==='log'?'best':'')+'"><div class="mc-name">对数模型</div><div class="mc-daily">'+Math.round(logDaily*promoMultiplier)+'</div><div class="mc-monthly">/天</div><div class="mc-tag" style="background:'+(bestModel==='log'?'var(--green-bg)':'var(--rule-light)')+';color:'+(bestModel==='log'?'var(--green)':'var(--muted)')+'">'+(bestModel==='log'?'推荐':'参考')+'</div></div>';
html+='<div class="model-card '+(bestModel==='power'?'best':'')+'"><div class="mc-name">幂函数模型</div><div class="mc-daily">'+Math.round(powerDaily*promoMultiplier)+'</div><div class="mc-monthly">/天</div><div class="mc-tag" style="background:'+(bestModel==='power'?'var(--green-bg)':'var(--rule-light)')+';color:'+(bestModel==='power'?'var(--green)':'var(--muted)')+'">'+(bestModel==='power'?'推荐':'参考')+'</div></div>';
html+='</div>';
html+='<h4 style="font-size:14px;font-weight:600;margin:16px 0 8px">📈 30天销量趋势 (含促销影响标注)</h4>';
html+='<div class="sales-trend-chart">';
var maxDaily=Math.max(adjustedDaily,ciHigh);
for(var d=0;d<30;d++){
var daily=adjustedDaily*(0.8+Math.sin(d/3)*0.15+Math.random()*0.1);
if(promo!=='none'&&d>=20){daily=daily*promoMultiplier;}
var h=Math.round(daily/maxDaily*140);
var color=d>=20&&promo!=='none'?'var(--gold)':'var(--accent)';
html+='<div class="sales-bar" style="height:'+h+'px;background:'+color+'" data-info="第'+(d+1)+'天: '+Math.round(daily)+'单"></div>';
}
html+='</div>';
if(promo!=='none'){
html+='<div style="font-size:12px;color:var(--gold);margin-top:4px;padding:0 16px">⚠ 第21-30天为促销期，已按'+promoText+'调整估算。非促销日均销量约 '+baseDaily+' 单/天</div>';
}
html+='<div class="confidence-interval"><h4 style="font-size:13px;font-weight:700;margin-bottom:8px">📊 置信区间分析</h4>';
html+='<div style="font-size:12px;color:var(--muted);margin-bottom:4px">日销量估算范围: '+ciLow+' ~ '+ciHigh+' 单 (70%置信度)</div>';
html+='<div class="ci-bar"><div class="ci-fill" style="left:15%;width:70%"></div><div class="ci-marker" style="left:50%"></div></div>';
html+='<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted)"><span>最低 '+ciLow+'</span><span style="color:var(--accent);font-weight:700">最可能 '+adjustedDaily+'</span><span>最高 '+ciHigh+'</span></div>';
html+='</div>';
html+='<div style="padding:16px;background:var(--accent-bg);border-radius:var(--radius-md);margin-top:12px"><h4 style="font-size:14px;font-weight:700;margin-bottom:8px">💡 分析洞察</h4><div style="font-size:13px;color:var(--ink-soft);line-height:1.8"><div>BSR #'+bsr+' 在'+cat+'类目对应日均销量约 <strong>'+adjustedDaily+'</strong> 单</div><div>月销售额约 <strong>$'+revenue.toLocaleString()+'</strong>（售价$'+price+'）</div><div>'+(promo!=='none'?'当前处于促销期，实际日均已按促销系数调整。剔除促销后基线日销约'+baseDaily+'单':'无促销状态，估算为正常日均水平')+'</div><div>推荐使用 <strong>'+bestModel+'</strong> 模型（最接近该BSR区间的估算精度）</div></div></div>';
html+='</div>';
document.getElementById('resultArea').innerHTML=html;
var saved=JSON.parse(localStorage.getItem('jx_sales_est')||'[]');
saved.unshift({asin:asin,bsr:bsr,daily:adjustedDaily,monthly:monthlySales,time:Date.now()});
