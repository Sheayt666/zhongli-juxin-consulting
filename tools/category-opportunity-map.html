<script>
var COM={
calc:function(){
var tp=parseFloat(document.getElementById('totalProducts').value)||0;
var as=parseFloat(document.getElementById('activeSellers').value)||0;
var t1s=parseFloat(document.getElementById('top1Sales').value)||0;
var price=parseFloat(document.getElementById('avgPrice').value)||0;
var rt=parseFloat(document.getElementById('reviewThreshold').value)||0;
var fba=parseFloat(document.getElementById('fbaRatio').value)||0;
var ap=parseFloat(document.getElementById('aplusRatio').value)||0;
var nsr=parseFloat(document.getElementById('newSuccessRate').value)||0;
var subcats=[
{name:'烹饪工具',heat:Math.round(tp*0.15/100),sales:Math.round(t1s*0.8)},
{name:'烘焙用品',heat:Math.round(tp*0.20/100),sales:Math.round(t1s*0.9)},
{name:'厨房收纳',heat:Math.round(tp*0.10/100),sales:Math.round(t1s*0.6)},
{name:'餐具器皿',heat:Math.round(tp*0.25/100),sales:Math.round(t1s*1.0)},
{name:'饮品器具',heat:Math.round(tp*0.12/100),sales:Math.round(t1s*0.85)},
{name:'保鲜存储',heat:Math.round(tp*0.08/100),sales:Math.round(t1s*0.7)},
{name:'刀具配件',heat:Math.round(tp*0.18/100),sales:Math.round(t1s*0.75)},
{name:'砧板配件',heat:Math.round(tp*0.06/100),sales:Math.round(t1s*0.65)},
{name:'量具工具',heat:Math.round(tp*0.05/100),sales:Math.round(t1s*0.5)},
{name:'厨房电子秤',heat:Math.round(tp*0.14/100),sales:Math.round(t1s*0.9)},
{name:'咖啡器具',heat:Math.round(tp*0.22/100),sales:Math.round(t1s*1.1)},
{name:'茶具配件',heat:Math.round(tp*0.07/100),sales:Math.round(t1s*0.55)},
{name:'烧烤用具',heat:Math.round(tp*0.16/100),sales:Math.round(t1s*0.8)},
{name:'厨房装饰',heat:Math.round(tp*0.04/100),sales:Math.round(t1s*0.45)},
{name:'食物处理',heat:Math.round(tp*0.19/100),sales:Math.round(t1s*0.95)}
];
var maxHeat=Math.max.apply(null,subcats.map(function(s){return s.heat}));
var minHeat=Math.min.apply(null,subcats.map(function(s){return s.heat}));
var hm=document.getElementById('heatmap');hm.innerHTML='';
subcats.forEach(function(s){
var ratio=maxHeat>minHeat?(s.heat-minHeat)/(maxHeat-minHeat):0.5;
var r=Math.round(16+239*ratio),g=Math.round(185-127*ratio),b=Math.round(129-85*ratio);
var bg='rgb('+r+','+g+','+b+')';
hm.innerHTML+='<div class="heat-cell" style="background:'+bg+'"><div class="hc-val">'+s.sales.toLocaleString()+'</div><div class="hc-lbl">'+s.name+'</div></div>';
});
var fl=document.getElementById('flowList');fl.innerHTML='';
var flows=[
{name:'自然搜索流量',pct:45,desc:'关键词自然排名带来的流量',color:'#4f46e5'},
{name:'广告流量(SP)',pct:25,desc:'Sponsored Products广告流量',color:'#6366f1'},
{name:'广告流量(SB/SD)',pct:8,desc:'品牌广告和展示广告流量',color:'#818cf8'},
{name:'类目浏览流量',pct:12,desc:'类目节点和筛选流量',color:'#a5b4fc'},
{name:'关联推荐流量',pct:7,desc:' frequently bought together等',color:'#f59e0b'},
{name:'Amazon's Choice',pct:3,desc:'AC标签带来的额外流量',color:'#10b981'}
];
flows.forEach(function(f){
fl.innerHTML+='<div class="flow-card"><h4>'+f.name+' ('+f.pct+'%)</h4><p style="font-size:12px;color:#64748b;margin-bottom:8px">'+f.desc+'</p><div class="flow-bar"><div class="flow-label">流量占比</div><div class="flow-track"><div class="flow-fill" style="width:'+(f.pct*2)+'%;background:'+f.color+'">'+f.pct+'%</div></div></div></div>';
});
var ac=document.getElementById('acChecklist');ac.innerHTML='';
var checks=[
{txt:'价格在类目同类产品中具有竞争力（Top 20%低价）',met:price<25},
{txt:'FBA配送（Prime标志可获取）',met:fba>=50},
{txt:'Listing完整度100%（标题/五点/描述/A+/图片全覆盖）',met:ap>=30},
{txt:'转化率高于类目平均（建议>15%）',met:true},
{txt:'库存充足且稳定（不断货）',met:true},
{txt:'评论数≥'+rt+'条且评分≥4.2',met:rt<=400},
{txt:'退货率低于类目平均（建议<8%）',met:true},
{txt:'发货速度快（1-2天配送）',met:fba>=50},
{txt:'价格稳定（近期无大幅波动）',met:true},
{txt:'关键词相关性强且精准匹配',met:true}
];
checks.forEach(function(c){
ac.innerHTML+='<li class="'+(c.met?'':'miss')+'">'+c.txt+'</li>';
});
}
};
COM.calc();
</script>
