}.bind(this));

});

});
},

var kws=['Stainless Steel','Insulated','Water Bottle','Vacuum','Leak Proof','BPA','18/8','Double Wall'];

text=text.replace(new RegExp(kw,'gi'),'<span class="kw-mark">'+kw+'</span>');
});
return text;
}
