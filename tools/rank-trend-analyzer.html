<div class="form-group"><label>ASIN</label><input type="text" id="asin" value="B08XYZ1234" oninput="analyzeTrend()"></div>
</div>

<script>
function analyzeTrend(){
var keyword=document.getElementById('keyword').value.trim();
var asin=document.getElementById('asin').value.trim();
var dataText=document.getElementById('rankData').value.trim();
if(!keyword||!dataText){document.getElementById('resultArea').innerHTML='<div class="empty-state"><div class="icon">📈</div><p>输入关键词和排名数据<br>分析排名趋势</p></div>';return;}
var ranks=[];
dataText.split(/[,\n]/).forEach(function(v){v=parseInt(v.trim());if(!isNaN(v)&&v>0)ranks.push(v);});
if(ranks.length<3){document.getElementById('resultArea').innerHTML='<div class="empty-state"><div class="icon">📈</div><p>输入关键词和排名数据<br>分析排名趋势</p></div>';return;}
var n=ranks.length;
var min=Math.min.apply(null,ranks);
var max=Math.max.apply(null,ranks);
var avg=(ranks.reduce(function(s,v){return s+v;},0)/n).toFixed(1);
var latest=ranks[n-1];
var first=ranks[0];
var trend=latest<first?'up':latest>first?'down':'stable';
var trendPct=Math.abs(((latest-first)/first*100)).toFixed(0);
var volatility=(Math.sqrt(ranks.reduce(function(s,v){return s+Math.pow(v-avg,2);},0)/n)).toFixed(1);
var volLevel=volatility<3?'low':volatility<6?'medium':'high';
var volColor=volLevel==='low'?'green':volLevel==='medium'?'gold':'red';
var volText=volLevel==='low'?'稳定':volLevel==='medium'?'中等波动':'剧烈波动';
var top10=ranks.filter(function(r){return r<=10;}).length;
var top30=ranks.filter(function(r){return r<=30&&r>10;}).length;
var below30=ranks.filter(function(r){return r>30;}).length;
var top10Pct=Math.round(top10/n*100);
var top30Pct=Math.round(top30/n*100);
var below30Pct=Math.round(below30/n*100);
var svgW=700,svgH=240,pad=40;
var xStep=(svgW-pad*2)/(n-1);
var yMax=Math.max(max+2,30);
var yMin=0;
var points=ranks.map(function(r,i){return(pad+i*xStep)+','+(svgH-pad-(r/yMax*(svgH-pad*2)));});
var polyline=points.join(' ');
var areaPoints=points.join(' L ')+(' L '+(pad+(n-1)*xStep)+','+(svgH-pad)+' L '+pad+','+(svgH-pad)+' Z');
var html='<div class="result-card"><h3 style="font-size:18px;font-weight:700;margin-bottom:16px">📈 排名趋势分析 — "'+keyword+'"</h3>';
html+='<div class="stat-grid">';
html+='<div class="stat-card"><div class="sc-num '+(latest<=10?'green':latest<=30?'gold':'red')+'">#'+latest+'</div><div class="sc-label">当前排名</div></div>';
html+='<div class="stat-card"><div class="sc-num '+(trend==='up'?'green':trend==='down'?'red':'gold')+'">'+(trend==='up'?'↑':'↓')+' '+trendPct+'%</div><div class="sc-label">'+(trend==='up'?'上升趋势':trend==='down'?'下降趋势':'持平')+'</div></div>';
html+='<div class="stat-card"><div class="sc-num">#'+min+'</div><div class="sc-label">最佳排名</div></div>';
html+='<div class="stat-card"><div class="sc-num">#'+max+'</div><div class="sc-label">最差排名</div></div>';
html+='</div>';
html+='<div class="trend-svg-container"><svg class="trend-svg" width="'+svgW+'" height="'+svgH+'" viewBox="0 0 '+svgW+' '+svgH+'">';
html+='<rect width="'+svgW+'" height="'+svgH+'" fill="#f8fafc" rx="12"/>';
for(var gy=0;gy<=5;gy++){
var yVal=Math.round(yMax/5*gy);
var yPos=svgH-pad-(yVal/yMax*(svgH-pad*2));
html+='<line x1="'+pad+'" y1="'+yPos+'" x2="'+(svgW-pad)+'" y2="'+yPos+'" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>';
html+='<text x="'+(pad-8)+'" y="'+(yPos+4)+'" text-anchor="end" font-size="10" fill="#94a3b8">'+(yVal===0?'0':'#'+yVal)+'</text>';
}
html+='<line x1="'+pad+'" y1="'+(svgH-pad)+'" x2="'+(svgW-pad)+'" y2="'+(svgH-pad)+'" stroke="#cbd5e1" stroke-width="2"/>';
html+='<line x1="'+pad+'" y1="0" x2="'+pad+'" y2="'+(svgH-pad)+'" stroke="#cbd5e1" stroke-width="2"/>';
html+='<polygon points="'+areaPoints+'" fill="url(#trendGrad)" opacity="0.15"/>';
html+='<defs><linearGradient id="trendGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4f46e5"/><stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/></linearGradient></defs>';
html+='<polyline points="'+polyline+'" fill="none" stroke="#4f46e5" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
ranks.forEach(function(r,i){
var cx=pad+i*xStep;
var cy=svgH-pad-(r/yMax*(svgH-pad*2));
html+='<circle cx="'+cx+'" cy="'+cy+'" r="3" fill="#4f46e5" stroke="#fff" stroke-width="1.5"/>';
});
if(trend==='up'){
var midIdx=Math.floor(n/2);
var midX=pad+midIdx*xStep;
html+='<line x1="'+midX+'" y1="20" x2="'+midX+'" y2="'+(svgH-pad)+'" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,5"/>';
html+='<text x="'+(midX+4)+'" y="32" font-size="11" fill="#f59e0b" font-weight="600">算法更新?</text>';
}
html+='</svg></div>';
html+='<div class="volatility-card" style="background:var(--'+volColor+'-bg);border:1px solid var(--'+volColor+')"><div class="vc-header"><span style="font-size:14px;font-weight:700">波动分析</span><span class="vc-level" style="background:var(--'+volColor+');color:#fff">'+volText+'</span></div><div style="font-size:13px;color:var(--ink-soft)">标准差: <strong>'+volatility+'</strong> | 平均排名: <strong>#'+avg+'</strong> | 排名区间: <strong>#'+min+'~#'+max+'</strong></div></div>';
html+='<h4 style="font-size:14px;font-weight:600;margin:16px 0 10px">📊 排名分布</h4>';
html+='<div style="display:flex;align-items:center;justify-content:center">';
var pieDeg={
green:top10Pct*3.6,
gold:top30Pct*3.6,
red:below30Pct*3.6
};
var greenEnd=top10Pct*3.6;
var goldEnd=greenEnd+top30Pct*3.6;
html+='<div class="dist-pie" style="background:conic-gradient(var(--green) 0deg '+greenEnd+'deg,var(--gold) '+greenEnd+'deg '+goldEnd+'deg,var(--red) '+goldEnd+'deg 360deg)"><div style="position:absolute;width:100px;height:100px;border-radius:50%;background:#fff;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center;flex-direction:column"><div style="font-size:24px;font-weight:800;color:var(--accent)">'+n+'</div><div style="font-size:11px;color:var(--muted)">天数据</div></div></div>';
html+='<div class="dist-pie-legend">';
html+='<div class="dist-pie-legend-item"><div class="dist-pie-legend-dot" style="background:var(--green)"></div><span>Top 10: <strong>'+top10+'天 ('+top10Pct+'%)</strong></span></div>';
html+='<div class="dist-pie-legend-item"><div class="dist-pie-legend-dot" style="background:var(--gold)"></div><span>11-30名: <strong>'+top30+'天 ('+top30Pct+'%)</strong></span></div>';
html+='<div class="dist-pie-legend-item"><div class="dist-pie-legend-dot" style="background:var(--red)"></div><span>30名以下: <strong>'+below30+'天 ('+below30Pct+'%)</strong></span></div>';
html+='</div></div>';
html+='<h4 style="font-size:14px;font-weight:600;margin:16px 0 10px">🔍 算法更新影响标注</h4>';
var bigDrops=[];
for(var i=1;i<n;i++){
if(ranks[i]-ranks[i-1]>=5){bigDrops.push({day:i,from:ranks[i-1],to:ranks[i]});}
}
if(bigDrops.length>0){
bigDrops.forEach(function(d){
html+='<div class="algo-marker"><strong>第'+d.day+'天</strong>: 排名从 #'+d.from+' 跌至 #'+d.to+' (下跌'+(d.to-d.from)+'位) — 可能受算法更新/竞品冲刺/销量波动影响</div>';
});
}else{
html+='<div style="padding:12px;background:var(--green-bg);border-radius:var(--radius-sm);font-size:13px;color:var(--green)">✓ 30天内无异常排名波动</div>';
}
