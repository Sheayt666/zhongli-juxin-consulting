<style>

.audit-tag.pass{background:var(--green-bg);color:var(--green)}
.audit-tag.fail{background:var(--red-bg);color:var(--red)}
.audit-tag.warn{background:var(--gold-bg);color:var(--gold)}

.missed-word-chip{display:inline-block;padding:4px 10px;background:#fff;border:1px solid #fecaca;border-radius:6px;font-size:12px;margin:2px;color:var(--red)}

<div class="input-card">
<h2>📊 Listing收录审计</h2>
<div class="form-row">
<div class="form-group"><label>ASIN</label><input type="text" id="asin" value="B08XYZ1234" oninput="runAudit()"></div>
<div class="form-group"><label>产品类型</label><select id="prodType" onchange="runAudit()"><option value="electronics">电子电器</option><option value="beauty">美妆个护</option><option value="textile">纺织服装</option><option value="home">家居用品</option></select></div>
</div>
<div class="form-group"><label>核心关键词列表 (每行一个)</label><textarea id="keywords" rows="8" oninput="runAudit()">wireless bluetooth earbuds
noise cancelling headphones
bluetooth earbuds for running
wireless earbuds cheap
best bluetooth earbuds 2026
earbuds with microphone
gaming earbuds wireless
iphone bluetooth earbuds
samsung wireless earbuds
earbuds for sleeping
noise isolating earbuds
bluetooth 5.0 earbuds
true wireless earbuds
earbuds for kids
waterproof earbuds</textarea></div>
<div class="form-group"><label>Listing标题</label><textarea id="title" rows="2" oninput="runAudit()">Wireless Bluetooth Earbuds, Noise Cancelling Headphones with Microphone, IPX7 Waterproof, 30H Playtime</textarea></div>
<div class="form-group"><label>后台搜索词 (Search Terms)</label><textarea id="searchTerms" rows="2" oninput="runAudit()">running gym sports iphone samsung android waterproof noise isolating true wireless gaming kids sleep</textarea></div>
</div>
<div class="result-area" id="resultArea"></div>

<div class="related-tools"><h3>🔗 相关工具</h3><div class="related-grid"><a href="index-checker.html" class="related-card"><span class="ricon">🔍</span><span class="rtext">收录检查器</span></a><a href="rank-trend-analyzer.html" class="related-card"><span class="ricon">📈</span><span class="rtext">排名趋势分析</span></a><a href="serp-feature-tracker.html" class="related-card"><span class="ricon">🎯</span><span class="rtext">SERP特征追踪</span></a><a href="a-plus-optimizer.html" class="related-card"><span class="ricon">🎨</span><span class="rtext">A+优化器</span></a><a href="seo-audit.html" class="related-card"><span class="ricon">🔍</span><span class="rtext">SEO审计</span></a></div></div>

<script>
function runAudit(){
var asin=document.getElementById('asin').value.trim();
var kwText=document.getElementById('keywords').value.trim();
var title=document.getElementById('title').value.trim().toLowerCase();
var st=document.getElementById('searchTerms').value.trim().toLowerCase();
if(!asin||!kwText){document.getElementById('resultArea').innerHTML='<div class="empty-state"><div class="icon">📊</div><p>输入ASIN和关键词列表<br>运行收录审计</p></div>';return;}
var keywords=kwText.split('\n').map(function(k){return k.trim();}).filter(function(k){return k;});
var titleWords=title.split(/[\s,]+/).filter(function(w){return w;});
var stWords=st.split(/[\s,]+/).filter(function(w){return w;});
var results=keywords.map(function(kw){
var kwLower=kw.toLowerCase();
var kwWords=kwLower.split(' ');
var inTitle=kwWords.every(function(w){return title.indexOf(w)>-1;})||title.indexOf(kwLower)>-1;
var inST=kwWords.every(function(w){return st.indexOf(w)>-1;})||st.indexOf(kwLower)>-1;
var status=inTitle?'pass':inST?'warn':'fail';
var location=inTitle?'标题':inST?'后台搜索词':'未收录';
return{keyword:kw,status:status,location:location,inTitle:inTitle,inST:inST};
});
var passCount=results.filter(function(r){return r.status==='pass';}).length;
var warnCount=results.filter(function(r){return r.status==='warn';}).length;
var failCount=results.filter(function(r){return r.status==='fail';}).length;
var score=Math.round((passCount+warnCount*0.5)/keywords.length*100);
var grade=score>=80?'A':score>=60?'B':score>=40?'C':'D';
var gradeColor=score>=80?'green':score>=60?'gold':score>=40?'gold':'red';
var html='<div class="audit-report"><h3 style="font-size:18px;font-weight:700;margin-bottom:16px">📊 Listing收录审计报告 — '+asin+'</h3>';
html+='<div style="display:flex;align-items:center;gap:20px;margin-bottom:20px">';
html+='<div style="text-align:center"><div style="font-size:48px;font-weight:800;color:var(--'+gradeColor+')">'+grade+'</div><div style="font-size:12px;color:var(--muted)">审计等级</div></div>';
html+='<div style="flex:1"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>收录健康度</span><span><strong>'+score+'%</strong> ('+passCount+'收录 / '+warnCount+'部分 / '+failCount+'未收录)</span></div>';
html+='<div class="audit-score-bar"><div class="audit-score-fill" style="width:'+score+'%;background:var(--'+gradeColor+')"></div></div>';
html+='<div style="font-size:12px;color:var(--muted);margin-top:4px">'+(score>=80?'收录状况优秀，Listing优化到位':score>=60?'收录状况良好，部分关键词需优化':score>=40?'收录状况一般，需优化后台搜索词和标题':'收录状况较差，需全面优化Listing内容')+'</div></div>';
html+='</div>';
html+='<h4 style="font-size:14px;font-weight:600;margin-bottom:10px">📋 逐词审计明细</h4>';
results.forEach(function(r){
html+='<div class="audit-row"><span style="flex:1">'+r.keyword+'</span><span style="color:var(--muted);font-size:12px;width:120px">'+r.location+'</span><span class="audit-tag '+r.status+'">'+(r.status==='pass'?'✓ 标题收录':r.status==='warn'?'⚠ 搜索词收录':'✗ 未收录')+'</span></div>';
});
html+='</div>';
if(failCount>0){
html+='<div class="audit-report"><h4 style="font-size:14px;font-weight:700;margin-bottom:10px">❌ 遗漏词发现 ('+failCount+'个)</h4>';
html+='<div class="missed-words"><div class="missed-words-title">以下关键词未被Listing收录：</div>';
results.filter(function(r){return r.status==='fail';}).forEach(function(r){
html+='<span class="missed-word-chip">'+r.keyword+'</span>';
});
html+='</div>';
html+='<h4 style="font-size:14px;font-weight:700;margin:16px 0 10px">💡 收录优化建议</h4>';
html+='<div style="font-size:13px;color:var(--ink-soft);line-height:1.8">';
html+='<div><strong>1. 标题优化：</strong>将核心高流量词放入标题前60字符，每个词只出现一次</div>';
html+='<div><strong>2. 后台搜索词：</strong>添加遗漏词的同义词和长尾变体，避免与标题重复</div>';
html+='<div><strong>3. 五点描述：</strong>在Bullet Points中自然融入未收录关键词</div>';
html+='<div><strong>4. 产品描述：</strong>在Description中增加关键词密度(2-3%为佳)</div>';
html+='<div><strong>5. A+内容：</strong>利用A+ Content的文本模块增加关键词覆盖</div>';
html+='<div><strong>6. 搜索词限制：</strong>后台Search Terms不超过250字节，用空格分隔不重复</div>';
html+='</div></div>';
}
html+='<div class="audit-report"><h4 style="font-size:14px;font-weight:700;margin-bottom:10px">📊 标题与搜索词分析</h4>';
html+='<div class="audit-row"><span>标题字符数</span><span>'+(title.length)+' / 200</span></div>';
html+='<div class="audit-row"><span>标题词数</span><span>'+titleWords.length+'词</span></div>';
html+='<div class="audit-row"><span>后台搜索词字节数</span><span>'+st.length+' / 250 bytes</span></div>';
html+='<div class="audit-row"><span>后台搜索词词数</span><span>'+stWords.length+'词</span></div>';
html+='<div class="audit-row"><span>标题与搜索词重复词</span><span style="color:var(--gold)">'+titleWords.filter(function(w){return stWords.indexOf(w)>-1;}).length+'词 (建议去重)</span></div>';
html+='</div>';
html+='<div style="padding:16px;background:var(--accent-bg);border-radius:var(--radius-md)"><div style="font-size:13px;color:var(--accent);line-height:1.8">💡 审计总结：当前收录健康度 <strong>'+score+'%</strong>，等级 <strong>'+grade+'</strong>。'+(score<80?'建议重点优化未收录关键词，提升收录率至80%以上。':'保持当前优化水平，定期复查。')+'</div></div>';
document.getElementById('resultArea').innerHTML=html;
var saved=JSON.parse(localStorage.getItem('jx_listing_audit')||'{}');
saved.lastRun=Date.now();
saved.asin=asin;
saved.score=score;
saved.grade=grade;
localStorage.setItem('jx_listing_audit',JSON.stringify(saved));
}
runAudit();

</script>
</body>
