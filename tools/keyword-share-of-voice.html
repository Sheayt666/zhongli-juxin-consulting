<main class="tool-section"><div class="container">

<div class="input-card">
<h2>🔊 关键词声量份额分析</h2>
<div class="form-row">
<div class="form-group"><label>关键词</label><input type="text" id="keyword" value="wireless bluetooth earbuds" oninput="analyzeSOV()"></div>
<div class="form-group"><label>分析维度</label><select id="dimension" onchange="analyzeSOV()"><option value="rank">按排名计算</option><option value="impression">按曝光计算</option></select></div>
</div>
<div class="form-group"><label>竞品排名数据 (每行: 卖家名称,排名,日均搜索量)</label><textarea id="compData" rows="6" oninput="analyzeSOV()">本品,3,50000
竞品A-BrandX,1,50000
竞品B-BrandY,5,50000
竞品C-BrandZ,8,50000
竞品D-BrandW,2,50000
竞品E-BrandV,12,50000</textarea></div>
</div>
<div class="result-area" id="resultArea"></div>

<div class="related-tools"><h3>🔗 相关工具</h3><div class="related-grid"><a href="organic-vs-ad-rank-tracker.html" class="related-card"><span class="ricon">🔄</span><span class="rtext">自然vs广告排名</span></a><a href="rank-trend-analyzer.html" class="related-card"><span class="ricon">📈</span><span class="rtext">排名趋势分析</span></a><a href="keyword-rank-tracker.html" class="related-card"><span class="ricon">📊</span><span class="rtext">排名追踪</span></a><a href="serp-feature-tracker.html" class="related-card"><span class="ricon">🎯</span><span class="rtext">SERP特征追踪</span></a><a href="category-node-advisor.html" class="related-card"><span class="ricon">🌳</span><span class="rtext">类目节点建议</span></a></div></div>

<script>
function analyzeSOV(){
var keyword=document.getElementById('keyword').value.trim();
var dimension=document.getElementById('dimension').value;
var dataText=document.getElementById('compData').value.trim();
if(!keyword||!dataText){document.getElementById('resultArea').innerHTML='<div class="empty-state"><div class="icon">🔊</div><p>输入关键词和竞品数据<br>分析声量份额</p></div>';return;}
var competitors=[];
dataText.split('\n').forEach(function(line){
line=line.trim();
if(!line)return;
var parts=line.split(',');
if(parts.length>=3){
competitors.push({name:parts[0].trim(),rank:parseInt(parts[1])||0,searches:parseInt(parts[2])||0});
}
});
if(competitors.length===0){document.getElementById('resultArea').innerHTML='<div class="empty-state"><div class="icon">🔊</div><p>输入关键词和竞品数据<br>分析声量份额</p></div>';return;}
competitors.forEach(function(c){
var sov;
if(dimension==='rank'){
if(c.rank<=1)sov=28;
else if(c.rank<=3)sov=18;
else if(c.rank<=5)sov=12;
else if(c.rank<=8)sov=8;
else if(c.rank<=12)sov=5;
else if(c.rank<=20)sov=3;
else sov=1;
}else{
var totalImpression=c.searches*(1-Math.min(c.rank-1,10)*0.08);
sov=totalImpression;
}
c.sov=sov;
});
var totalSOV=competitors.reduce(function(s,c){return s+c.sov;},0);
competitors.forEach(function(c){c.sovPct=Math.round(c.sov/totalSOV*100);});
competitors.sort(function(a,b){return b.sov-a.sov;});
var selfComp=competitors.find(function(c){return c.name.indexOf('本品')>-1;});
var selfSOV=selfComp?selfComp.sovPct:0;
var selfRank=selfComp?selfComp.rank:0;
var html='<div class="result-card"><h3 style="font-size:18px;font-weight:700;margin-bottom:16px">🔊 声量份额分析 — "'+keyword+'"</h3>';
html+='<div class="stat-grid">';
html+='<div class="stat-card"><div class="sc-num accent">'+selfSOV+'%</div><div class="sc-label">本品SOV</div></div>';
html+='<div class="stat-card"><div class="sc-num green">#'+selfRank+'</div><div class="sc-label">本品排名</div></div>';
html+='<div class="stat-card"><div class="sc-num">'+competitors.length+'</div><div class="sc-label">竞品总数</div></div>';
html+='<div class="stat-card"><div class="sc-num '+(selfSOV>=20?'green':selfSOV>=10?'gold':'red')+'">'+(selfSOV>=20?'领先':selfSOV>=10?'中等':'落后')+'</div><div class="sc-label">SOV评级</div></div>';
html+='</div>';
var colors=['#4f46e5','#10b981','#f59e0b','#ef4444','#0891b2','#8b5cf6','#ec4899','#64748b'];
var pieDeg=0;
var pieGradient='';
competitors.forEach(function(c,i){
var deg=c.sovPct*3.6;
pieGradient+=colors[i%colors.length]+' '+pieDeg+'deg '+(pieDeg+deg)+'deg';
if(i<competitors.length-1)pieGradient+=',';
pieDeg+=deg;
});
html+='<div class="sov-pie-container">';
html+='<div class="sov-pie" style="background:conic-gradient('+pieGradient+')">';
html+='<div class="sov-pie-center"><div class="spc-num">'+selfSOV+'%</div><div class="spc-label">本品份额</div></div>';
html+='</div>';
html+='<div class="sov-legend">';
competitors.forEach(function(c,i){
var isSelf=c.name.indexOf('本品')>-1;
html+='<div class="sov-legend-item">';
html+='<div class="sov-legend-dot" style="background:'+colors[i%colors.length]+'"></div>';
html+='<span style="width:100px;font-weight:'+(isSelf?'700':'400')+';color:'+(isSelf?'var(--accent)':'var(--ink-soft)')+'">'+c.name+'</span>';
html+='<div class="sov-legend-bar"><div class="sov-legend-bar-fill" style="width:'+c.sovPct+'%;background:'+colors[i%colors.length]+'"></div></div>';
html+='<span style="width:36px;text-align:right;font-weight:600">'+c.sovPct+'%</span>';
html+='</div>';
});
html+='</div></div>';
html+='<h4 style="font-size:14px;font-weight:600;margin:16px 0 8px">📋 竞品声量分布表</h4>';
html+='<table class="competitor-table"><thead><tr><th>卖家</th><th>排名</th><th>SOV占比</th><th>vs本品</th><th>30天趋势</th></tr></thead><tbody>';
competitors.forEach(function(c){
var isSelf=c.name.indexOf('本品')>-1;
var diff=selfComp?(c.sovPct-selfComp.sovPct):0;
var trend=[];
for(var t=0;t<10;t++){trend.push(Math.random()*100);}
html+='<tr '+(isSelf?'style="background:var(--accent-bg)"':'')+'><td>'+(isSelf?'⭐ ':'')+c.name+'</td><td>#'+c.rank+'</td><td><strong>'+c.sovPct+'%</strong></td><td style="color:'+(diff>0?'var(--red)':diff<0?'var(--green)':'var(--muted)')+'">'+(diff>0?'+':'')+diff+'%</td><td><div class="trend-mini-chart">'+trend.map(function(v){return '<div class="trend-mini-bar" style="height:'+Math.round(v/4)+'px;background:'+(isSelf?'var(--accent)':'var(--gold)')+'"></div>';}).join('')+'</div></td></tr>';
});
html+='</tbody></table>';
html+='<div style="padding:16px;background:var(--accent-bg);border-radius:var(--radius-md);margin-top:16px"><h4 style="font-size:14px;font-weight:700;margin-bottom:8px">💡 SOV优化策略</h4><div style="font-size:13px;color:var(--ink-soft);line-height:1.8">';
html+='<div>本品当前SOV: <strong style="color:var(--accent)">'+selfSOV+'%</strong>，'+(selfSOV>=20?'市场领先地位稳固':selfSOV>=10?'有竞争力但头部竞品份额更大':'份额偏小，需加大投入')+'</div>';
html+='<div><strong>提升策略：</strong></div>';
html+='<div>1. 提升自然排名至Top3可增加SOV约10-15%</div>';
html+='<div>2. 增加SP/ SB广告投放，抢占更多SERP位</div>';
html+='<div>3. 优化Listing转化率，提升自然排名权重</div>';
html+='<div>4. 争取Amazon\'s Choice标志可获得额外SOV加成</div>';
html+='<div>5. 目标SOV: ≥25%（类目领先水平）</div>';
html+='</div></div>';
html+='</div>';
document.getElementById('resultArea').innerHTML=html;
var saved=JSON.parse(localStorage.getItem('jx_sov_analysis')||'{}');
saved.lastRun=Date.now();
saved.keyword=keyword;
saved.selfSOV=selfSOV;
saved.competitorCount=competitors.length;
localStorage.setItem('jx_sov_analysis',JSON.stringify(saved));
}
analyzeSOV();

</script>
</body>
