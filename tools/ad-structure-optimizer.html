<section style="padding:24px 0"><div class="container">
<div class="section-block"><h3>📋 当前广告结构数据</h3>
<div class="calc-row-3">

</div>

</div>

<div class="section-block"><h3>📊 结构合理性评分</h3>

<div class="result-summary-bar">
<div class="rsb-card"><div class="rsb-val" id="matchCoverage">0%</div><div class="rsb-lbl">匹配覆盖度</div></div>

<div class="rsb-card"><div class="rsb-val gold" id="actualAcos">0%</div><div class="rsb-lbl">实际ACoS</div></div>
<div class="rsb-card"><div class="rsb-val green" id="cpa">$0</div><div class="rsb-lbl">单次转化成本</div></div>

</div></section>
<script>
var ASO={
calc:function(){
var sp=+document.getElementById('spCount').value||0;
var sb=+document.getElementById('sbCount').value||0;
var sd=+document.getElementById('sdCount').value||0;
var broad=+document.getElementById('broadKw').value||0;
var phrase=+document.getElementById('phraseKw').value||0;
var exact=+document.getElementById('exactKw').value||0;
var budget=+document.getElementById('totalBudget').value||0;
var spend=+document.getElementById('totalSpend').value||0;
var conv=+document.getElementById('totalConv').value||0;
var rev=+document.getElementById('totalRev').value||0;
var hasAuto=document.getElementById('hasAuto').value==='1';
var matchCov=broad>0&&phrase>0&&exact>0?100:broad>0&&exact>0?70:broad>0||exact>0?40:0;
var budgetUtil=budget>0?Math.round(spend/budget*100):0;
var acos=rev>0?Math.round(spend/rev*100):0;
var cpa=conv>0?spend/conv:0;
var roas=spend>0?rev/spend:0;
var totalKw=broad+phrase+exact;
var dims=[];
dims.push({name:'匹配类型覆盖度',score:matchCov,color:matchCov>=80?'#10b981':matchCov>=50?'#f59e0b':'#ef4444'});
dims.push({name:'预算利用率',score:Math.min(100,budgetUtil),color:budgetUtil>=80?'#10b981':budgetUtil>=50?'#f59e0b':'#ef4444'});
dims.push({name:'ACoS健康度',score:Math.max(0,100-acos),color:acos<=25?'#10b981':acos<=40?'#f59e0b':'#ef4444'});
dims.push({name:'广告类型覆盖',score:Math.min(100,(sp>0?33:0)+(sb>0?33:0)+(sd>0?34:0)),color:(sp>0&&sb>0&&sd>0)?'#10b981':(sp+sb+sd)>=2?'#f59e0b':'#ef4444'});
dims.push({name:'Auto广告配置',score:hasAuto?100:0,color:hasAuto?'#10b981':'#ef4444'});
dims.push({name:'关键词数量',score:Math.min(100,totalKw*2),color:totalKw>=50?'#10b981':totalKw>=20?'#f59e0b':'#ef4444'});
dims.push({name:'ROAS表现',score:Math.min(100,roas*20),color:roas>=4?'#10b981':roas>=2?'#f59e0b':'#ef4444'});
var totalScore=Math.round(dims.reduce(function(s,d){return s+d.score},0)/dims.length);
document.getElementById('scoreNum').textContent=totalScore;
var sc=document.getElementById('scoreCircle');
sc.style.setProperty('--deg',totalScore*3.6+'deg');
sc.style.setProperty('--c',totalScore>=80?'#10b981':totalScore>=50?'#f59e0b':'#ef4444');
document.getElementById('matchCoverage').textContent=matchCov+'%';
document.getElementById('budgetUtil').textContent=budgetUtil+'%';
document.getElementById('actualAcos').textContent=acos+'%';
document.getElementById('cpa').textContent='$'+cpa.toFixed(2);
document.getElementById('roas').textContent=roas.toFixed(1)+'x';
var dl=document.getElementById('dimList');dl.innerHTML='';
dims.forEach(function(d){
dl.innerHTML+='<div class="dim-bar"><div class="dim-label">'+d.name+'</div><div class="dim-track"><div class="dim-fill" style="width:'+d.score+'%;background:'+d.color+'">'+Math.round(d.score)+'</div></div></div>';
});
var sl=document.getElementById('suggestList');sl.innerHTML='';
if(!hasAuto)sl.innerHTML+='<div class="suggest-card danger"><div style="font-size:24px">🤖</div><div><h4 style="font-weight:700;margin-bottom:4px">缺少Auto广告</h4><p style="font-size:13px;color:#334155">未设置自动广告，无法发现新出单词。建议立即创建SP-Auto广告活动，持续收割搜索词。</p></div></div>';
if(matchCov<80)sl.innerHTML+='<div class="suggest-card warn"><div style="font-size:24px">🎯</div><div><h4 style="font-weight:700;margin-bottom:4px">匹配类型不完整</h4><p style="font-size:13px;color:#334155">缺少部分匹配类型，建议同时覆盖Broad/Phrase/Exact三种匹配，形成漏斗式关键词管理。</p></div></div>';
if(budgetUtil<50)sl.innerHTML+='<div class="suggest-card warn"><div style="font-size:24px">💰</div><div><h4 style="font-weight:700;margin-bottom:4px">预算利用率低</h4><p style="font-size:13px;color:#334155">日预算仅使用'+budgetUtil+'%，可能竞价过低或关键词不足。建议提高竞价或增加关键词数量。</p></div></div>';
if(budgetUtil>=95)sl.innerHTML+='<div class="suggest-card warn"><div style="font-size:24px">⚠️</div><div><h4 style="font-weight:700;margin-bottom:4px">预算过早耗尽</h4><p style="font-size:13px;color:#334155">预算利用率'+budgetUtil+'%，广告可能过早停止展示。建议提高日预算或降低部分竞价。</p></div></div>';
if(acos>40)sl.innerHTML+='<div class="suggest-card danger"><div style="font-size:24px">📉</div><div><h4 style="font-weight:700;margin-bottom:4px">ACoS过高</h4><p style="font-size:13px;color:#334155">当前ACoS为'+acos+'%，建议：1)否定低转化搜索词；2)降低Broad匹配竞价；3)增加Exact匹配高转化词预算。</p></div></div>';
if(roas<2)sl.innerHTML+='<div class="suggest-card danger"><div style="font-size:24px">💸</div><div><h4 style="font-weight:700;margin-bottom:4px">ROAS偏低</h4><p style="font-size:13px;color:#334155">广告投入产出比仅'+roas.toFixed(1)+'x，低于2x盈亏线。建议暂停低效活动，集中预算到高转化关键词。</p></div></div>';
if(totalKw<20)sl.innerHTML+='<div class="suggest-card warn"><div style="font-size:24px">📋</div><div><h4 style="font-weight:700;margin-bottom:4px">关键词数量不足</h4><p style="font-size:13px;color:#334155">仅'+totalKw+'个关键词，覆盖面有限。建议通过关键词工具扩充至50+关键词。</p></div></div>';
if(totalScore>=80&&!sl.innerHTML)sl.innerHTML='<div class="suggest-card good"><div style="font-size:24px">✅</div><div><h4 style="font-weight:700;margin-bottom:4px">广告结构良好</h4><p style="font-size:13px;color:#334155">综合评分'+totalScore+'分，广告结构合理。建议持续监控ACoS和搜索词报告，定期优化。</p></div></div>';
}
};
ASO.calc();
</script>
