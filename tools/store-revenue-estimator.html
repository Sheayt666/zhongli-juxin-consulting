body{font-family:system-ui,-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg-soft);color:var(--ink);line-height:1.6;font-size:15px;-webkit-font-smoothing:antialiased}

.related-tools h3{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--ink)}

@media(max-width:768px){.form-row,.form-row-3{grid-template-columns:1fr}.top-nav-links{display:none}}

.revenue-pie-container{display:flex;align-items:center;justify-content:center;gap:32px;margin:20px 0}
.revenue-pie{width:200px;height:200px;border-radius:50%;position:relative}
.revenue-pie-center{position:absolute;width:100px;height:100px;border-radius:50%;background:#fff;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center;flex-direction:column}
.revenue-pie-center .rpc-num{font-size:22px;font-weight:800;color:var(--accent)}
.revenue-pie-center .rpc-label{font-size:10px;color:var(--muted)}
.asin-table{width:100%;border-collapse:collapse;margin-top:12px}
.asin-table th{background:var(--accent-bg);color:var(--accent);padding:12px;text-align:left;font-size:12px;font-weight:700}
.asin-table td{padding:12px;border-bottom:1px solid var(--rule-light);font-size:13px}
.asin-table tr.top-revenue{background:var(--green-bg)}
.revenue-bar{height:16px;border-radius:4px;background:var(--rule-light);overflow:hidden}
.revenue-bar-fill{height:100%;border-radius:4px;transition:width .5s}
.category-breakdown{padding:16px;background:var(--bg-soft);border-radius:var(--radius-md);margin:12px 0}
.category-bar-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.category-bar-label{width:100px;font-size:13px;font-weight:600}
.category-bar-track{flex:1;height:20px;background:var(--rule-light);border-radius:6px;overflow:hidden}
.category-bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:10px;font-weight:600;color:#fff}
.category-bar-value{width:80px;font-size:13px;font-weight:600;text-align:right}

</style>

<div class="input-card">
<h2>💰 竞品店铺营收估算</h2>
<div class="form-row">
<div class="form-group"><label>竞品店铺/品牌</label><input type="text" id="store" value="BrandX Official" oninput="estimateRevenue()"></div>
<div class="form-group"><label>总ASIN数量</label><input type="number" id="asinCount" value="15" min="1" oninput="estimateRevenue()"></div>
</div>
<div class="form-group"><label>ASIN数据 (每行: ASIN,类目,售价,日均销量)</label><textarea id="asinData" rows="8" oninput="estimateRevenue()">B08A001,耳机,29.99,45
B08A002,音箱,49.99,22
B08A003,充电器,19.99,38
B08A004,数据线,12.99,65
B08A005,支架,14.99,30
B08A006,保护套,9.99,55
B08A007,屏幕贴膜,6.99,80
B08A008,键盘,39.99,12
B08A009,鼠标,24.99,18
B08A010,耳机配件,7.99,40</textarea></div>

<script>
function estimateRevenue(){
var store=document.getElementById('store').value.trim();
var dataText=document.getElementById('asinData').value.trim();
if(!store||!dataText){document.getElementById('resultArea').innerHTML='<div class="empty-state"><div class="icon">💰</div><p>输入竞品ASIN数据<br>估算全店铺营收</p></div>';return;}
var asins=[];
dataText.split('\n').forEach(function(line){
line=line.trim();
if(!line)return;
var parts=line.split(',');
if(parts.length>=4){
asins.push({asin:parts[0].trim(),category:parts[1].trim(),price:parseFloat(parts[2])||0,dailySales:parseInt(parts[3])||0});
}
});
if(asins.length===0){document.getElementById('resultArea').innerHTML='<div class="empty-state"><div class="icon">💰</div><p>输入竞品ASIN数据<br>估算全店铺营收</p></div>';return;}
asins.forEach(function(a){
a.monthlyRevenue=a.price*a.dailySales*30;
a.monthlySales=a.dailySales*30;
});
asins.sort(function(a,b){return b.monthlyRevenue-a.monthlyRevenue;});
var totalRevenue=asins.reduce(function(s,a){return s+a.monthlyRevenue;},0);
var totalSales=asins.reduce(function(s,a){return s+a.monthlySales;},0);
var avgRevenue=totalRevenue/asins.length;
var topAsin=asins[0];
var topPct=Math.round(topAsin.monthlyRevenue/totalRevenue*100);
var categoryMap={};
asins.forEach(function(a){
if(!categoryMap[a.category])categoryMap[a.category]={revenue:0,count:0};
categoryMap[a.category].revenue+=a.monthlyRevenue;
categoryMap[a.category].count++;
});
var categories=Object.keys(categoryMap).map(function(cat){
return{name:cat,revenue:categoryMap[cat].revenue,count:categoryMap[cat].count,pct:Math.round(categoryMap[cat].revenue/totalRevenue*100)};
}).sort(function(a,b){return b.revenue-a.revenue;});
var colors=['#4f46e5','#10b981','#f59e0b','#ef4444','#0891b2','#8b5cf6','#ec4899'];
var html='<div class="result-card"><h3 style="font-size:18px;font-weight:700;margin-bottom:16px">💰 店铺营收估算 — '+store+'</h3>';
html+='<div class="stat-grid">';
html+='<div class="stat-card"><div class="sc-num accent">$'+(totalRevenue/1000).toFixed(1)+'K</div><div class="sc-label">月总营收</div></div>';
html+='<div class="stat-card"><div class="sc-num green">'+totalSales.toLocaleString()+'</div><div class="sc-label">月总销量</div></div>';
html+='<div class="stat-card"><div class="sc-num gold">$'+(avgRevenue/1000).toFixed(1)+'K</div><div class="sc-label">单品均营收</div></div>';
html+='<div class="stat-card"><div class="sc-num">'+asins.length+'</div><div class="sc-label">ASIN数量</div></div>';
html+='</div>';
html+='<div class="revenue-pie-container">';
var pieDeg=0;
var pieGradient='';
categories.forEach(function(c,i){
var deg=c.pct*3.6;
pieGradient+=colors[i%colors.length]+' '+pieDeg+'deg '+(pieDeg+deg)+'deg';
if(i<categories.length-1)pieGradient+=',';
pieDeg+=deg;
});
html+='<div class="revenue-pie" style="background:conic-gradient('+pieGradient+')"><div class="revenue-pie-center"><div class="rpc-num">$'+(totalRevenue/1000).toFixed(0)+'K</div><div class="rpc-label">月营收</div></div></div>';
html+='<div style="display:flex;flex-direction:column;gap:8px">';
categories.forEach(function(c,i){
html+='<div style="display:flex;align-items:center;gap:8px;font-size:13px"><div style="width:14px;height:14px;border-radius:4px;background:'+colors[i%colors.length]+'"></div><span>'+c.name+' ('+c.count+'个) <strong>'+c.pct+'%</strong></span></div>';
});
html+='</div></div>';
html+='<h4 style="font-size:14px;font-weight:600;margin:16px 0 8px">📋 ASIN营收排名</h4>';
html+='<table class="asin-table"><thead><tr><th>排名</th><th>ASIN</th><th>类目</th><th>售价</th><th>日均销量</th><th>月营收</th><th>营收占比</th></tr></thead><tbody>';
asins.forEach(function(a,i){
var pct=Math.round(a.monthlyRevenue/totalRevenue*100);
var isTop=i<3;
html+='<tr class="'+(isTop?'top-revenue':'')+'"><td>'+(i+1)+'</td><td>'+a.asin+'</td><td>'+a.category+'</td><td>$'+a.price.toFixed(2)+'</td><td>'+a.dailySales+'</td><td><strong>$'+a.monthlyRevenue.toLocaleString()+'</strong></td><td><div class="revenue-bar"><div class="revenue-bar-fill" style="width:'+pct+'%;background:'+(isTop?'var(--green)':'var(--accent)')+'">'+pct+'%</div></div></td></tr>';
});
html+='</tbody></table>';
html+='<h4 style="font-size:14px;font-weight:600;margin:16px 0 8px">📊 品类贡献分析</h4>';
html+='<div class="category-breakdown">';
categories.forEach(function(c,i){
html+='<div class="category-bar-row"><div class="category-bar-label">'+c.name+'</div>';
html+='<div class="category-bar-track"><div class="category-bar-fill" style="width:'+c.pct+'%;background:'+colors[i%colors.length]+'">'+c.pct+'%</div></div>';
html+='<div class="category-bar-value">$'+(c.revenue/1000).toFixed(1)+'K</div></div>';
});
html+='</div>';
html+='<div style="padding:16px;background:var(--accent-bg);border-radius:var(--radius-md);margin-top:12px"><h4 style="font-size:14px;font-weight:700;margin-bottom:8px">💡 营收洞察</h4><div style="font-size:13px;color:var(--ink-soft);line-height:1.8">';
html+='<div>'+store+' 月总营收约 <strong style="color:var(--accent)">$'+(totalRevenue/1000).toFixed(1)+'K</strong>，'+asins.length+'个ASIN</div>';
html+='<div>营收Top1: <strong>'+topAsin.asin+'</strong> ('+topAsin.category+')，月营收$'+topAsin.monthlyRevenue.toLocaleString()+'，占'+topPct+'%</div>';
html+='<div>主力品类: <strong>'+categories[0].name+'</strong>，贡献'+categories[0].pct+'%营收</div>';
html+='<div>营收集中度: '+(topPct>=30?'高风险 - 单品依赖度高':topPct>=15?'适中 - 有主力但不过度依赖':'分散 - 营收分布均匀')+'</div>';
html+='<div>单品均营收: $'+(avgRevenue).toFixed(0)+'，' + (avgRevenue>=3000?'头部产品表现强劲':avgRevenue>=1000?'中规中矩':'长尾产品为主') + '</div>';
html+='</div></div>';
html+='</div>';
document.getElementById('resultArea').innerHTML=html;
var saved=JSON.parse(localStorage.getItem('jx_revenue_est')||'[]');
saved.unshift({store:store,totalRevenue:totalRevenue,asinCount:asins.length,time:Date.now()});
if(saved.length>20)saved=saved.slice(0,20);
localStorage.setItem('jx_revenue_est',JSON.stringify(saved));
}
estimateRevenue();

</script>
