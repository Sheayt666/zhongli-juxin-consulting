<main class="tool-section"><div class="container">

<div class="input-card">
<h2>🔄 自然vs广告排名对比</h2>
<div class="form-row">
<div class="form-group"><label>关键词</label><input type="text" id="keyword" value="wireless bluetooth earbuds" oninput="compareRanks()"></div>
<div class="form-group"><label>ASIN</label><input type="text" id="asin" value="B08XYZ1234" oninput="compareRanks()"></div>
</div>
<div class="form-group"><label>关键词排名数据 (每行: 关键词,自然排名,广告排名)</label><textarea id="rankData" rows="6" oninput="compareRanks()">wireless bluetooth earbuds,8,3
bluetooth earbuds,15,7
noise cancelling earbuds,22,5
wireless earbuds cheap,5,12
best bluetooth earbuds,35,8
earbuds with mic,18,not running
gaming earbuds,40,not running
waterproof earbuds,12,4</textarea></div>
</div>
<div class="result-area" id="resultArea"></div>

<div class="related-tools"><h3>🔗 相关工具</h3><div class="related-grid"><a href="rank-trend-analyzer.html" class="related-card"><span class="ricon">📈</span><span class="rtext">排名趋势分析</span></a><a href="keyword-rank-tracker.html" class="related-card"><span class="ricon">📊</span><span class="rtext">排名追踪</span></a><a href="serp-feature-tracker.html" class="related-card"><span class="ricon">🎯</span><span class="rtext">SERP特征追踪</span></a><a href="keyword-share-of-voice.html" class="related-card"><span class="ricon">🔊</span><span class="rtext">声量份额</span></a><a href="index-checker.html" class="related-card"><span class="ricon">🔍</span><span class="rtext">收录检查器</span></a></div></div>

<script>
function compareRanks(){
var keyword=document.getElementById('keyword').value.trim();
var asin=document.getElementById('asin').value.trim();
var dataText=document.getElementById('rankData').value.trim();
if(!keyword||!dataText){document.getElementById('resultArea').innerHTML='<div class="empty-state"><div class="icon">🔄</div><p>输入关键词和排名数据<br>对比自然与广告排名</p></div>';return;}
var data=[];
dataText.split('\n').forEach(function(line){
line=line.trim();
if(!line)return;
var parts=line.split(',');
if(parts.length>=3){
var organic=parseInt(parts[1])||0;
var adText=parts[2].trim();
var ad=adText==='not running'?null:parseInt(adText)||0;
data.push({keyword:parts[0].trim(),organic:organic,ad:ad,adRunning:ad!==null});
}
});
if(data.length===0){document.getElementById('resultArea').innerHTML='<div class="empty-state"><div class="icon">🔄</div><p>输入关键词和排名数据<br>对比自然与广告排名</p></div>';return;}
var adRunning=data.filter(function(d){return d.adRunning;}).length;
var avgOrganic=Math.round(data.reduce(function(s,d){return s+d.organic;},0)/data.length);
var avgAd=adRunning>0?Math.round(data.filter(function(d){return d.adRunning;}).reduce(function(s,d){return s+d.ad;},0)/adRunning):0;
var bothTop10=data.filter(function(d){return d.organic<=10&&d.adRunning&&d.ad<=10;}).length;
var organicOnly=data.filter(function(d){return d.organic<=10&&(!d.adRunning||d.ad>10);}).length;
var adOnly=data.filter(function(d){return d.adRunning&&d.ad<=10&&d.organic>10;}).length;
var neither=data.filter(function(d){return d.organic>10&&(!d.adRunning||d.ad>10);}).length;
var html='<div class="result-card"><h3 style="font-size:18px;font-weight:700;margin-bottom:16px">🔄 自然vs广告排名对比 — '+asin+'</h3>';
html+='<div class="dual-rank-compare">';
html+='<div class="rank-card organic"><div class="rc-label">🌿 自然排名</div><div class="rc-rank" style="color:var(--green)">#'+avgOrganic+'</div><div class="rc-trend">平均排名 (越低越好)</div></div>';
html+='<div class="rank-card ad"><div class="rc-label">📢 广告排名</div><div class="rc-rank" style="color:var(--accent)">'+(avgAd>0?'#'+avgAd:'N/A')+'</div><div class="rc-trend">'+(adRunning>0?'平均排名 ('+adRunning+'词投放中)':'无广告投放')+'</div></div>';
html+='</div>';
html+='<div class="stat-grid">';
html+='<div class="stat-card"><div class="sc-num green">'+bothTop10+'</div><div class="sc-label">双Top10</div></div>';
html+='<div class="stat-card"><div class="sc-num accent">'+organicOnly+'</div><div class="sc-label">仅自然Top10</div></div>';
html+='<div class="stat-card"><div class="sc-num gold">'+adOnly+'</div><div class="sc-label">仅广告Top10</div></div>';
html+='<div class="stat-card"><div class="sc-num red">'+neither+'</div><div class="sc-label">均未Top10</div></div>';
html+='</div>';
html+='<h4 style="font-size:14px;font-weight:600;margin:16px 0 8px">📋 双排名对比表</h4>';
html+='<table class="dual-rank-table"><thead><tr><th>关键词</th><th>自然排名</th><th>广告排名</th><th>广告状态</th><th>互相影响</th></tr></thead><tbody>';
data.forEach(function(d){
var impact='';
if(d.adRunning){
if(d.ad<d.organic)impact='<span style="color:var(--accent)">广告拉动自然</span>';
else if(d.ad>d.organic)impact='<span style="color:var(--green)">自然拉动广告</span>';
else impact='<span style="color:var(--muted)">排名一致</span>';
}else{
impact='<span style="color:var(--muted)">未投放广告</span>';
}
html+='<tr><td>'+d.keyword+'</td><td class="rank-cell rank-organic">#'+d.organic+'</td><td class="rank-cell rank-ad">'+(d.adRunning?'#'+d.ad:'—')+'</td><td>'+(d.adRunning?'<span style="color:var(--green)">投放中</span>':'<span style="color:var(--muted)">未投放</span>')+'</td><td>'+impact+'</td></tr>';
});
html+='</tbody></table>';
html+='<div class="rank-correlation" style="background:var(--accent-bg)"><h4 style="font-size:14px;font-weight:700;margin-bottom:10px">📊 互相影响分析</h4>';
html+='<div class="bar-compare"><div class="bc-label">双Top10</div><div class="bc-track"><div class="bc-fill" style="width:'+Math.round(bothTop10/data.length*100)+'%;background:var(--green)">'+bothTop10+'</div></div><div class="bc-value">'+Math.round(bothTop10/data.length*100)+'%</div></div>';
html+='<div class="bar-compare"><div class="bc-label">仅自然</div><div class="bc-track"><div class="bc-fill" style="width:'+Math.round(organicOnly/data.length*100)+'%;background:var(--green)">'+organicOnly+'</div></div><div class="bc-value">'+Math.round(organicOnly/data.length*100)+'%</div></div>';
html+='<div class="bar-compare"><div class="bc-label">仅广告</div><div class="bc-track"><div class="bc-fill" style="width:'+Math.round(adOnly/data.length*100)+'%;background:var(--accent)">'+adOnly+'</div></div><div class="bc-value">'+Math.round(adOnly/data.length*100)+'%</div></div>';
html+='<div class="bar-compare"><div class="bc-label">均未</div><div class="bc-track"><div class="bc-fill" style="width:'+Math.round(neither/data.length*100)+'%;background:var(--red)">'+neither+'</div></div><div class="bc-value">'+Math.round(neither/data.length*100)+'%</div></div>';
html+='</div>';
html+='<div style="padding:16px;background:var(--green-bg);border-radius:var(--radius-md);margin-top:16px"><h4 style="font-size:14px;font-weight:700;color:var(--green);margin-bottom:8px">💡 优化策略建议</h4><div style="font-size:13px;color:var(--ink-soft);line-height:1.8">';
html+='<div><strong>1. 双Top10词 ('+bothTop10+'个)：</strong>维持广告投入，自然排名稳定后可适当降低竞价</div>';
html+='<div><strong>2. 仅自然Top10词 ('+organicOnly+'个)：</strong>增加广告投放，抢占更多SERP曝光位</div>';
html+='<div><strong>3. 仅广告Top10词 ('+adOnly+'个)：</strong>优化Listing SEO，提升自然排名降低广告依赖</div>';
html+='<div><strong>4. 均未Top10词 ('+neither+'个)：</strong>评估关键词价值，低价值词可暂停，高价值词需同时优化SEO+PPC</div>';
html+='<div><strong>5. 协同效应：</strong>自然+广告同时Top10的关键词转化率最高，优先争取</div>';
html+='</div></div>';
html+='</div>';
document.getElementById('resultArea').innerHTML=html;
var saved=JSON.parse(localStorage.getItem('jx_organic_ad_rank')||'{}');
saved.lastRun=Date.now();
saved.asin=asin;
saved.avgOrganic=avgOrganic;
saved.avgAd=avgAd;
localStorage.setItem('jx_organic_ad_rank',JSON.stringify(saved));
}
compareRanks();

</script>
</body>
