          <option value="US">美国 (US)</option>

          <option value="JP">日本 (JP)</option>

      <div class="stat-card s2"><div class="stat-val" id="statVat">0%</div><div class="stat-lbl">增值税/消费税</div></div>
      <div class="stat-card s3"><div class="stat-val" id="statTotal">0%</div><div class="stat-lbl">综合税负</div></div>

      <a href="packaging-compliance-checker.html" class="related-card"><div class="related-card-icon">📦</div><div class="related-card-content"><h5>包装合规检查器</h5><p>包装法规检查</p></div></a>

<script>
var IRL = (function(){
  'use strict';
  var TARIFF = {
    '6403_US':{mfn:8.5,vat:0,duty:'从价税8.5%',note:'部分鞋类享GSP零关税'},
    '6403_EU':{mfn:8,vat:20,duty:'从价税8%+VAT',note:'欧盟反倾销税可能适用'},
    '6403_JP':{mfn:6.5,vat:10,duty:'从价税6.5%+消费税10%',note:'JIS标识要求'},
    '6403_UK':{mfn:8,vat:20,duty:'从价税8%+VAT20%',note:'UKCA标签要求'},
    '6403_CA':{mfn:18,vat:5,duty:'从价税18%+GST5%',note:'加拿大鞋类关税较高'},
    '6403_AU':{mfn:5,vat:10,duty:'从价税5%+GST10%',note:'FTA可能减免'},
    '6109_US':{mfn:16.5,vat:0,duty:'从价税16.5%',note:'纤维成分决定税率'},
    '6109_EU':{mfn:12,vat:20,duty:'从价税12%+VAT',note:'REACH纺织品限制'},
    '6109_JP':{mfn:9.3,vat:10,duty:'从价税9.3%+消费税',note:'JIS标签要求'},
    '6109_UK':{mfn:12,vat:20,duty:'从价税12%+VAT',note:'UK纺织品法规'},
    '6109_CA':{mfn:18,vat:5,duty:'从价税18%+GST',note:'双语标签要求'},
    '6109_AU':{mfn:5,vat:10,duty:'从价税5%+GST',note:'纤维成分标签'},
    '8517_US':{mfn:0,vat:0,duty:'零关税',note:'ITA协议覆盖，通信设备零关税'},
    '8517_EU':{mfn:0,vat:20,duty:'零关税+VAT',note:'ITA协议，需CE-RED认证'},
    '8517_JP':{mfn:0,vat:10,duty:'零关税+消费税',note:'技适认证要求'},
    '8517_UK':{mfn:0,vat:20,duty:'零关税+VAT',note:'UKCA认证'},
    '8517_CA':{mfn:0,vat:5,duty:'零关税+GST',note:'IC认证要求'},
    '8517_AU':{mfn:0,vat:10,duty:'零关税+GST',note:'RCM认证'},
    '8528_US':{mfn:3.9,vat:0,duty:'从价税3.9%',note:'FCC认证要求'},
    '8528_EU':{mfn:14,vat:20,duty:'从价税14%+VAT',note:'CE认证+ErP能效'},
    '8528_JP':{mfn:0,vat:10,duty:'零关税+消费税',note:'PSE认证'},
    '8528_UK':{mfn:14,vat:20,duty:'从价税14%+VAT',note:'UKCA认证'},
    '8528_CA':{mfn:5,vat:5,duty:'从价税5%+GST',note:'CSA认证'},
    '8528_AU':{mfn:5,vat:10,duty:'从价税5%+GST',note:'RCM认证'},
    '9503_US':{mfn:0,vat:0,duty:'零关税',note:'CPSIA安全要求严格'},
    '9503_EU':{mfn:4.7,vat:20,duty:'从价税4.7%+VAT',note:'EN 71玩具标准'},
    '9503_JP':{mfn:0,vat:10,duty:'零关税+消费税',note:'ST标志认证'},
    '9503_UK':{mfn:4.7,vat:20,duty:'从价税4.7%+VAT',note:'UK EN 71标准'},
    '9503_CA':{mfn:0,vat:5,duty:'零关税+GST',note:'CCPSA玩具法规'},
    '9503_AU':{mfn:5,vat:10,duty:'从价税5%+GST',note:'AS/NZS 8124标准'},
    '3304_US':{mfn:0,vat:0,duty:'零关税',note:'FDA+MoCRA注册要求'},
    '3304_EU':{mfn:0,vat:20,duty:'零关税+VAT',note:'CPNP通报+EC 1223'},
    '3304_JP':{mfn:0,vat:10,duty:'零关税+消费税',note:'药机法注册'},
    '3304_UK':{mfn:0,vat:20,duty:'零关税+VAT',note:'SCPN通报'},
    '3304_CA':{mfn:0,vat:5,duty:'零关税+GST',note:'化妆品通报'},
    '3304_AU':{mfn:5,vat:10,duty:'从价税5%+GST',note:'AICIS注册'},
    '2101_US':{mfn:0,vat:0,duty:'零关税',note:'FDA食品注册+FCE/SID'},
    '2101_EU':{mfn:7.5,vat:20,duty:'从价税7.5%+VAT',note:'EFSA+食品接触材料'},
    '2101_JP':{mfn:12,vat:10,duty:'从价税12%+消费税',note:'食品卫生法'},
    '2101_UK':{mfn:7.5,vat:20,duty:'从价税7.5%+VAT',note:'UK食品安全法'},
    '2101_CA':{mfn:0,vat:5,duty:'零关税+GST',note:'CFIA+SFCA'},
    '2101_AU':{mfn:5,vat:10,duty:'从价税5%+GST',note:'FSANZ标准'},
    '3924_US':{mfn:3.4,vat:0,duty:'从价税3.4%',note:'FDA食品接触要求'},
    '3924_EU':{mfn:6.5,vat:20,duty:'从价税6.5%+VAT',note:'REACH+食品接触法规'},
    '3924_JP':{mfn:3.9,vat:10,duty:'从价税3.9%+消费税',note:'食品卫生法'},
    '3924_UK':{mfn:6.5,vat:20,duty:'从价税6.5%+VAT',note:'UK塑料包装税'},
    '3924_CA':{mfn:6.5,vat:5,duty:'从价税6.5%+GST',note:'CCPSA'},
    '3924_AU':{mfn:5,vat:10,duty:'从价税5%+GST',note:'APCO+食品标准'}
  };
  var COUNTRY_NAME = {US:'美国',EU:'欧盟',JP:'日本',UK:'英国',CA:'加拿大',AU:'澳大利亚'};
  var PRODUCT_NAME = {'6403':'鞋类','6109':'T恤/针织衫','8517':'手机/通信设备','8528':'显示器/屏幕','9503':'玩具','3304':'化妆品','2101':'咖啡/茶','3924':'塑料制品'};

  function compute(){
    var prod = document.getElementById('inpProduct').value;
    var country = document.getElementById('inpCountry').value;
    var key = prod+'_'+country;
    var data = TARIFF[key];
    if(!data){ data = {mfn:5,vat:10,duty:'估算5%+VAT',note:'请查询官方HTS数据库获取精确税率'}; }
    var total = data.mfn + data.vat;
    document.getElementById('statTariff').textContent = data.mfn+'%';
    document.getElementById('statVat').textContent = data.vat+'%';
    document.getElementById('statTotal').textContent = total+'%';

    var html = '';
    // 关税信息卡
    html += '<div class="info-card"><div class="info-card-header"><div class="info-icon tariff">💰</div><div class="info-card-title">关税信息</div></div>';
    html += '<div class="info-row"><span class="lbl">HTS代码</span><span class="val">'+prod+'</span></div>';
    html += '<div class="info-row"><span class="lbl">产品类别</span><span class="val">'+PRODUCT_NAME[prod]+'</span></div>';
    html += '<div class="info-row"><span class="lbl">目标市场</span><span class="val">'+COUNTRY_NAME[country]+'</span></div>';
    html += '<div class="info-row"><span class="lbl">最惠国关税(MFN)</span><span class="val" style="color:var(--t-primary)">'+data.mfn+'%</span></div>';
    html += '<div class="info-row"><span class="lbl">增值税/消费税</span><span class="val" style="color:var(--t-warning)">'+data.vat+'%</span></div>';
    html += '<div class="info-row"><span class="lbl">综合税负</span><span class="val" style="color:var(--t-danger)">'+total+'%</span></div>';
    html += '<div class="info-row"><span class="lbl">计税方式</span><span class="val">'+data.duty+'</span></div>';
    html += '<div class="info-row"><span class="lbl">备注</span><span class="val" style="font-size:12px">'+data.note+'</span></div>';
    html += '</div>';

    // 进口要求卡
    var reqs = getRequirements(country, prod);
    html += '<div class="info-card"><div class="info-card-header"><div class="info-icon requirement">📋</div><div class="info-card-title">进口要求</div></div>';
    reqs.forEach(function(r){
      html += '<div class="info-row"><span class="lbl">'+r.label+'</span><span class="val">'+r.value+'</span></div>';
    });
    html += '</div>';

    // 限制条件卡
    var restrictions = getRestrictions(country, prod);
    html += '<div class="info-card"><div class="info-card-header"><div class="info-icon restriction">⚠️</div><div class="info-card-title">限制条件</div></div>';
    html += '<div style="margin-top:8px">';
    restrictions.forEach(function(r){
      html += '<span class="tag '+r.cls+'">'+r.text+'</span>';
    });
    html += '</div></div>';

    document.getElementById('regulationCards').innerHTML = html;
  }

  function getRequirements(country, prod){
    var base = [
      {label:'原产地证明',value:country==='US'?'一般不需要':'建议提供'},
      {label:'商业发票',value:'必须（含HS Code、价值、原产国）'},
      {label:'装箱单',value:'必须（含重量、件数、尺寸）'},
      {label:'提单(B/L)',value:'必须（海运）或空运单(AWB)'}
    ];
    if(country==='EU'){ base.push({label:'EORI号码',value:'欧盟进口商需EORI注册'}); base.push({label:'CE标志',value:'适用产品必须加贴'}); }
    if(country==='US'){ base.push({label:'FDA注册',value:'食品/化妆品/医疗器械需注册'}); base.push({label:'ISF申报',value:'海运需提前24h提交ISF'}); }
    if(country==='JP'){ base.push({label:'JIS/PSE标志',value:'适用产品需加贴'}); base.push({label:'进口商注册',value:'需指定日本进口代理'}); }
    if(country==='CA'){ base.push({label:'双语标签',value:'英语和法语双语要求'}); }
    if(country==='UK'){ base.push({label:'UKCA标志',value:'适用产品需加贴'}); }
    if(country==='AU'){ base.push({label:'RCM标志',value:'电气产品需加贴'}); }
    return base;
  }

  function getRestrictions(country, prod){
    var r = [];
    r.push({cls:'tag-red',text:'需确认进口许可证要求'});
    if(prod==='9503'){ r.push({cls:'tag-red',text:'CPSIA/EN 71儿童安全强制认证'}); }
    if(prod==='3304'){ r.push({cls:'tag-yellow',text:'化妆品成分限制清单'}); r.push({cls:'tag-red',text:'禁用成分检查'}); }
    if(prod==='8517'||prod==='8528'){ r.push({cls:'tag-red',text:'FCC/CE-RED强制认证'}); r.push({cls:'tag-yellow',text:'锂电池UN38.3运输要求'}); }
    if(prod==='6109'){ r.push({cls:'tag-yellow',text:'REACH偶氮染料限制'}); }
    if(country==='EU'){ r.push({cls:'tag-yellow',text:'EPR包装回收注册'}); r.push({cls:'tag-blue',text:'CBAM碳关税可能适用'}); }
    if(country==='US'){ r.push({cls:'tag-yellow',text:'Section 301关税可能适用'}); r.push({cls:'tag-blue',text:'AD/CVD反倾销税可能适用'}); }
    if(prod==='2101'){ r.push({cls:'tag-red',text:'食品安全注册强制'}); r.push({cls:'tag-yellow',text:'食品接触材料合规'}); }
    r.push({cls:'tag-green',text:'FTA优惠关税可能适用'});
    return r;
  }

  return { compute:compute };
})();
