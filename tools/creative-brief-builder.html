<style>

.input-field input:focus,.input-field textarea:focus,.input-field select:focus{outline:none;border-color:var(--indigo);box-shadow:0 0 0 3px rgba(79,70,229,.1)}

.brief-section{margin-bottom:20px}
.brief-section h4{font-size:14px;font-weight:700;color:var(--indigo);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;border-left:3px solid var(--indigo);padding-left:10px}
.brief-section p{font-size:14px;color:var(--ink-soft);line-height:1.8}
.brief-section ul{list-style:none;padding-left:14px}

.brief-tag{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;margin:2px}

.copy-btn-full:hover{background:var(--indigo-dark);transform:translateY(-1px)}
.tool-footer{padding:32px 0;text-align:center;border-top:1px solid var(--rule);margin-top:40px}

.rt-card:hover{border-color:var(--indigo);box-shadow:var(--shadow);transform:translateY(-2px)}
.rt-icon{font-size:22px;flex-shrink:0}.rt-content h5{font-size:13px;font-weight:600;color:var(--ink)}.rt-content p{font-size:11px;color:var(--muted)}
.back-link{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;border-radius:50px;background:var(--indigo);color:#fff;font-size:14px;font-weight:600}
@media(max-width:768px){.grid-2{grid-template-columns:1fr}.related-tools{grid-template-columns:1fr}.container{padding:0 16px}}
</style>

<body>

<div class="container"><div class="breadcrumb"><a href="../index.html">首页</a><span class="sep">/</span><a href="index.html">实用工具</a><span class="sep">/</span><a href="#">W35</a><span class="sep">/</span><span class="current">Brief构建</span></div></div>
<header class="tool-hero"><div class="container"><span class="tool-hero-badge">W35 广告创意工作流</span><h1>创意Brief<em>构建器</em></h1><p>输入产品信息、目标受众、核心信息和调性要求，自动生成结构化创意Brief文档，包含项目背景、创意方向、交付要求和验收标准，一键复制使用。</p></div></header>
<section class="tool-section"><div class="container">
<div class="grid-2">
<div class="card">
<h3>📋 Brief信息输入</h3>
<div class="input-field"><label>项目名称</label><input type="text" id="projectName" value="Q4圣诞季广告创意项目" oninput="genBrief()"></div>
<div class="input-field"><label>产品名称</label><input type="text" id="productName" value="智能温控水杯" oninput="genBrief()"></div>
<div class="input-field"><label>产品类目</label><input type="text" id="category" value="家居/小家电" oninput="genBrief()"></div>
<div class="input-field"><label>核心卖点（逗号分隔）</label><textarea id="features" oninput="genBrief()">55度恒温,12小时保温,APP智能控制,食品级316不锈钢</textarea></div>
<div class="input-field"><label>目标受众描述</label><textarea id="audience" oninput="genBrief()">25-40岁城市白领，注重生活品质，有健康饮水习惯，月收入8K+，追求智能化生活体验</textarea></div>
<div class="input-field"><label>核心传播信息</label><input type="text" id="coreMessage" value="每一口都是完美温度" oninput="genBrief()"></div>
<div class="input-field"><label>品牌调性</label><select id="tone" onchange="genBrief()"><option value="专业科技">专业科技</option><option value="温暖生活">温暖生活</option><option value="高端简约">高端简约</option><option value="年轻活力">年轻活力</option><option value="奢华品质">奢华品质</option></select></div>
<div class="input-field"><label>投放渠道（逗号分隔）</label><input type="text" id="channels" value="Amazon SP, Facebook, Instagram, Google Display" oninput="genBrief()"></div>
<div class="input-field"><label>预算范围</label><input type="text" id="budget" value="$5,000 - $10,000" oninput="genBrief()"></div>
<div class="input-field"><label>交付时间</label><input type="text" id="deadline" value="2026-10-15" oninput="genBrief()"></div>
</div>
<div>
<div class="card" style="padding:0;overflow:hidden">
<div style="padding:20px 28px;background:var(--bg);border-bottom:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between">
<h3 style="margin:0;border:none;padding:0;font-size:17px">📄 生成的创意Brief</h3>
<button class="copy-btn-full" style="width:auto;padding:8px 20px;margin:0" onclick="copyBrief()">📋 复制Brief</button>
</div>
<div class="brief-doc" id="briefDoc"></div>
</div>
</div>
</div>
<div class="tool-footer">
<h3 style="font-size:18px;margin-bottom:16px;text-align:left">相关工具推荐</h3>
<div class="related-tools">
<a href="ad-copy-variants.html" class="rt-card"><span class="rt-icon">📝</span><div class="rt-content"><h5>文案变体生成器</h5><p>5种风格文案</p></div></a>
<a href="ad-creative-scorecard.html" class="rt-card"><span class="rt-icon">🎯</span><div class="rt-content"><h5>创意综合评分卡</h5><p>10维度评分</p></div></a>
<a href="headline-generator.html" class="rt-card"><span class="rt-icon">✍️</span><div class="rt-content"><h5>标题生成器</h5><p>10种公式30标题</p></div></a>
</div>
<a href="index.html" class="back-link">← 返回工具中心</a>
</div>

<script>
function genBrief(){
const v=id=>document.getElementById(id).value;
const pn=v('projectName'),prod=v('productName'),cat=v('category');
const feats=v('features').split(/[,，\n]/).filter(f=>f.trim());
const aud=v('audience'),msg=v('coreMessage'),tone=v('tone');
const ch=v('channels'),budget=v('budget'),dl=v('deadline');
const now=new Date().toLocaleDateString('zh-CN');
const doc=document.getElementById('briefDoc');
doc.innerHTML=`
<div class="brief-header">
<div class="brief-title">${pn}</div>
<div class="brief-meta">创意Brief | 生成日期：${now} | 交付截止：${dl}</div>
</div>
<div class="brief-section">
<h4>1. 项目背景</h4>
<p>为${prod}（${cat}类目）策划${pn}，通过多渠道广告投放触达目标受众，传递"${msg}"的核心信息，实现品牌认知与销售转化的双重提升。</p>
</div>
<div class="brief-section">
<h4>2. 产品信息</h4>
<ul>${feats.map(f=>`<li>${f.trim()}</li>`).join('')}</ul>
</div>
<div class="brief-section">
<h4>3. 目标受众</h4>
<p>${aud}</p>
</div>
<div class="brief-section">
<h4>4. 核心传播信息</h4>
<p style="font-size:16px;font-weight:700;color:var(--indigo)">"${msg}"</p>
</div>
<div class="brief-section">
<h4>5. 创意方向与调性</h4>
<p>品牌调性：<span class="brief-tag" style="background:var(--indigo-bg);color:var(--indigo)">${tone}</span></p>
<p>创意需围绕核心卖点展开，通过生活化场景展示产品使用体验，视觉风格${tone}，文案简洁有力，突出"${msg}"的情感共鸣。</p>
</div>
<div class="brief-section">
<h4>6. 投放渠道</h4>
<p>${ch.split(/[,，]/).map(c=>`<span class="brief-tag" style="background:var(--green-bg);color:var(--green)">${c.trim()}</span>`).join('')}</p>
</div>
<div class="brief-section">
<h4>7. 交付物清单</h4>
<ul>
<li>主视觉KV 1套（横版1200x628 + 竖版1080x1920）</li>
<li>产品场景图 3-5张（不同使用场景）</li>
<li>短视频素材 2版（15秒+30秒）</li>
<li>文案变体 5版（不同风格）</li>
<li>展示广告素材 3组（多尺寸适配）</li>
</ul>
</div>
<div class="brief-section">
<h4>8. 预算与时间</h4>
<p><strong>预算范围：</strong>${budget}</p>
<p><strong>交付截止：</strong>${dl}</p>
</div>
<div class="brief-section">
<h4>9. 验收标准</h4>
<ul>
<li>素材尺寸符合各渠道规范</li>
<li>文案无错别字，卖点表述准确</li>
<li>视觉风格统一，品牌调性一致</li>
<li>移动端展示效果优化</li>
<li>加载速度<2秒（单图<200KB）</li>
</ul>
</div>`;
try{localStorage.setItem('jx_brief_builder',JSON.stringify({pn,prod,cat,features:v('features'),aud,msg,tone,ch,budget,dl}))}catch(e){}
}
function copyBrief(){
const text=document.getElementById('briefDoc').innerText;
navigator.clipboard?.writeText(text);
alert('Brief已复制到剪贴板！');
}
try{const s=JSON.parse(localStorage.getItem('jx_brief_builder'));if(s){Object.entries(s).forEach(([k,v])=>{const id={pn:'projectName',prod:'productName',features:'features',aud:'audience',msg:'coreMessage',ch:'channels',budget:'budget',dl:'deadline'}[k]||k;if(document.getElementById(id))document.getElementById(id).value=v;})}}catch(e){}
genBrief();
</script>
</body>
