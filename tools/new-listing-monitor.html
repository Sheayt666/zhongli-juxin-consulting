<html lang="zh-CN">
<head>

<title>新品监控器 - 竞品新品追踪与爆款识别 | 跨境卖家工具</title>
<style>
:root{--bg:#ffffff;--bg-soft:#f8fafc;--surface:#ffffff;--ink:#0f172a;--ink-soft:#334155;--muted:#64748b;--muted-light:#94a3b8;--rule:#e2e8f0;--rule-light:#f1f5f9;--accent:#4f46e5;--accent-dark:#4338ca;--accent-bg:#eef2ff;--green:#10b981;--green-bg:#ecfdf5;--gold:#f59e0b;--gold-bg:#fffbeb;--red:#ef4444;--red-bg:#fef2f2;--cyan:#0891b2;--cyan-bg:#ecfeff;--shadow-sm:0 1px 2px rgba(0,0,0,0.05);--shadow-md:0 4px 6px -1px rgba(0,0,0,0.07),0 2px 4px -2px rgba(0,0,0,0.05);--shadow-lg:0 10px 15px -3px rgba(0,0,0,0.08),0 4px 6px -4px rgba(0,0,0,0.04);--shadow-xl:0 20px 25px -5px rgba(0,0,0,0.08),0 8px 10px -6px rgba(0,0,0,0.04);--radius-sm:8px;--radius-md:12px;--radius-lg:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg-soft);color:var(--ink);line-height:1.6;font-size:15px;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none;transition:color .2s}
.container{max-width:1152px;margin:0 auto;padding:0 24px}
.top-nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--rule);padding:14px 0}
.top-nav-inner{display:flex;align-items:center;justify-content:space-between}
.top-nav-logo{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:700;color:var(--ink)}
.top-nav-logo .logo-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#6366f1);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px}
.top-nav-links{display:flex;gap:28px;list-style:none}
.top-nav-links a{color:var(--ink-soft);font-size:14px;font-weight:500}
.top-nav-links a:hover{color:var(--accent)}
.workflow-nav{background:linear-gradient(135deg,#f8f9ff 0%,#f0f4ff 100%);border:1px solid #e0e7ff;border-radius:16px;padding:20px 24px;margin:24px auto;max-width:1152px;overflow-x:auto}
.workflow-nav-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:14px}
.workflow-nav-header .workflow-icon{font-size:18px}
.workflow-nav-header .workflow-name{font-weight:600;color:var(--accent)}
.workflow-nav-steps{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.workflow-nav-steps .step{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;background:#fff;border:1px solid #e0e7ff;color:var(--accent);text-decoration:none;transition:all .2s;white-space:nowrap}
.workflow-nav-steps .step:hover{background:var(--accent);color:#fff;transform:translateY(-1px)}
.workflow-nav-steps .step.current{background:var(--accent);color:#fff;font-weight:600}
.workflow-nav-steps .arrow{color:#c7d2fe;font-size:13px}
.breadcrumb{padding:12px 0;font-size:13px;color:var(--muted)}
.breadcrumb a{color:var(--muted)}.breadcrumb a:hover{color:var(--accent)}
.breadcrumb .sep{margin:0 6px;color:var(--rule)}.breadcrumb .current{color:var(--ink);font-weight:500}
.tool-hero{background:linear-gradient(135deg,#eef2ff 0%,#f5f3ff 50%,#fffbeb 100%);padding:48px 0 40px;text-align:center}
.tool-hero-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;background:rgba(255,255,255,.9);border:1px solid rgba(79,70,229,.2);border-radius:50px;font-size:13px;color:var(--accent);font-weight:600;margin-bottom:20px}
.tool-hero h1{font-size:clamp(28px,4vw,42px);font-weight:800;margin-bottom:14px;color:var(--ink)}
.tool-hero h1 em{font-style:normal;background:linear-gradient(135deg,var(--accent),#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tool-hero-desc{font-size:16px;color:var(--muted);max-width:600px;margin:0 auto}
.tool-section{padding:40px 0 60px}
.input-card{background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius-lg);padding:28px;box-shadow:var(--shadow-md);margin-bottom:24px}
.input-card h2{font-size:18px;font-weight:700;margin-bottom:16px;color:var(--ink)}
.form-group{margin-bottom:16px}.form-group label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 16px;border:1px solid var(--rule);border-radius:var(--radius-sm);font-size:14px;color:var(--ink);background:#fff;transition:border-color .2s,box-shadow .2s;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.result-area{margin-top:24px}
.result-card{background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius-lg);padding:28px;box-shadow:var(--shadow-md);margin-bottom:16px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin:20px 0}
.stat-card{padding:18px;border-radius:var(--radius-md);text-align:center;background:var(--bg-soft);border:1px solid var(--rule-light)}
.stat-card .sc-num{font-size:26px;font-weight:800;color:var(--accent)}
.stat-card .sc-num.green{color:var(--green)}.stat-card .sc-num.red{color:var(--red)}.stat-card .sc-num.gold{color:var(--gold)}
.stat-card .sc-label{font-size:12px;color:var(--muted);margin-top:4px}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}.empty-state .icon{font-size:48px;margin-bottom:12px}
.related-tools{background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius-lg);padding:28px;margin-top:32px}
.related-tools h3{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--ink)}
.related-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.related-card{display:flex;gap:10px;padding:14px;background:var(--bg-soft);border-radius:var(--radius-sm);text-decoration:none;transition:all .2s}
.related-card:hover{background:var(--accent-bg);transform:translateX(4px)}
.related-card .ricon{font-size:20px;flex-shrink:0}.related-card .rtext{font-size:13px;font-weight:500;color:var(--ink-soft)}
.back-link{text-align:center;margin-top:32px}
.back-link a{display:inline-flex;align-items:center;gap:8px;padding:12px 32px;border-radius:50px;font-size:14px;font-weight:600;background:linear-gradient(135deg,var(--accent),#6366f1);color:#fff;box-shadow:0 4px 14px rgba(79,70,229,.3);transition:all .2s}
.back-link a:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(79,70,229,.4)}
footer{background:#0f172a;color:rgba(255,255,255,.5);padding:32px 0;text-align:center;font-size:13px;margin-top:40px}
@media(max-width:768px){.form-row,.form-row-3{grid-template-columns:1fr}.top-nav-links{display:none}}

.new-listing-table{width:100%;border-collapse:collapse;margin-top:12px}
.new-listing-table th{background:var(--accent-bg);color:var(--accent);padding:12px;text-align:left;font-size:12px;font-weight:700}
.new-listing-table td{padding:12px;border-bottom:1px solid var(--rule-light);font-size:13px}
.new-listing-table tr.hot{background:var(--green-bg)}
.hot-badge{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;background:var(--red);color:#fff}
.trend-mini{display:flex;align-items:flex-end;gap:2px;height:24px}
.trend-mini-bar{width:5px;border-radius:2px 2px 0 0;min-height:2px}
.bubble-chart{height:240px;position:relative;background:var(--bg-soft);border-radius:var(--radius-md);margin:16px 0;padding:20px;border:1px solid var(--rule)}
.bubble{position:absolute;border-radius:50%;opacity:0.7;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;cursor:pointer;transition:all .2s}
.bubble:hover{opacity:1;transform:scale(1.1)}
.bubble-axis-x{position:absolute;bottom:0;left:20px;right:20px;height:2px;background:var(--rule)}
.bubble-axis-y{position:absolute;bottom:0;left:20px;top:20px;width:2px;background:var(--rule)}
.bubble-label-x{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--muted)}
.bubble-label-y{position:absolute;left:-30px;top:50%;transform:translateY(-50%) rotate(-90deg);font-size:11px;color:var(--muted)}

</style>
</head>

<main class="tool-section"><div class="container">

<div class="input-card">
<h2>🆕 新品监控</h2>
<div class="form-row">
<div class="form-group"><label>竞品店铺/品牌</label><input type="text" id="store" value="BrandX Official" oninput="monitorNew()"></div>
<div class="form-group"><label>类目</label><select id="category" onchange="monitorNew()"><option value="electronics">电子电器</option><option value="beauty">美妆个护</option><option value="home">家居厨房</option><option value="toys">玩具</option></select></div>
</div>
<div class="form-group"><label>新品数据 (每行: ASIN,名称,上架天数,价格,BSR,评论数,日均销量估算)</label><textarea id="newData" rows="7" oninput="monitorNew()">B09NEW001,无线耳机Pro,15,32.99,850,8,35
B09NEW002,蓝牙音箱Mini,8,19.99,2100,3,18
B09NEW003,充电宝Slim,30,24.99,520,15,42
B09NEW004,手机支架Pro,5,12.99,3200,1,8
B09NEW005,数据线套装,20,14.99,680,10,28
B09NEW006,无线充电器,12,27.99,1500,5,22</textarea></div>
</div>
<div class="result-area" id="resultArea"></div>

<div class="related-tools"><h3>🔗 相关工具</h3><div class="related-grid"><a href="competitor-sales-estimator.html" class="related-card"><span class="ricon">📊</span><span class="rtext">竞品销量估算</span></a><a href="competitor-pricing-strategy.html" class="related-card"><span class="ricon">💲</span><span class="rtext">竞品定价策略</span></a><a href="store-revenue-estimator.html" class="related-card"><span class="ricon">💰</span><span class="rtext">店铺营收估算</span></a><a href="hijack-monitor.html" class="related-card"><span class="ricon">🛡️</span><span class="rtext">跟卖监控</span></a><a href="listing-spy.html" class="related-card"><span class="ricon">🔍</span><span class="rtext">Listing监控</span></a></div></div>

<script>
function monitorNew(){
var store=document.getElementById('store').value.trim();
var cat=document.getElementById('category').value;
var dataText=document.getElementById('newData').value.trim();
if(!store||!dataText){document.getElementById('resultArea').innerHTML='<div class="empty-state"><div class="icon">🆕</div><p>输入竞品店铺和新品数据<br>追踪新品表现</p></div>';return;}
var listings=[];
dataText.split('\n').forEach(function(line){
line=line.trim();
if(!line)return;
var parts=line.split(',');
if(parts.length>=7){
listings.push({asin:parts[0].trim(),name:parts[1].trim(),days:parseInt(parts[2])||0,price:parseFloat(parts[3])||0,bsr:parseInt(parts[4])||0,reviews:parseInt(parts[5])||0,dailySales:parseInt(parts[6])||0});
}
});
if(listings.length===0){document.getElementById('resultArea').innerHTML='<div class="empty-state"><div class="icon">🆕</div><p>输入竞品店铺和新品数据<br>追踪新品表现</p></div>';return;}
listings.forEach(function(l){
l.reviewVelocity=l.days>0?(l.reviews/l.days).toFixed(2):0;
l.revenue=l.dailySales*l.price*30;
l.growthScore=Math.round((l.dailySales*0.3+l.reviewVelocity*20+(10000-l.bsr)/100+(30-l.days)*0.5));
l.isHot=l.dailySales>=30&&l.reviewVelocity>=0.5&&l.days<=20;
});
listings.sort(function(a,b){return b.growthScore-a.growthScore;});
var totalRevenue=listings.reduce(function(s,l){return s+l.revenue;},0);
var hotCount=listings.filter(function(l){return l.isHot;}).length;
var avgDays=Math.round(listings.reduce(function(s,l){return s+l.days;},0)/listings.length);
var html='<div class="result-card"><h3 style="font-size:18px;font-weight:700;margin-bottom:16px">🆕 新品监控 — '+store+'</h3>';
html+='<div class="stat-grid">';
html+='<div class="stat-card"><div class="sc-num accent">'+listings.length+'</div><div class="sc-label">新品数量</div></div>';
html+='<div class="stat-card"><div class="sc-num red">'+hotCount+'</div><div class="sc-label">爆款苗头</div></div>';
html+='<div class="stat-card"><div class="sc-num green">$'+(totalRevenue/1000).toFixed(1)+'K</div><div class="sc-label">月营收总额</div></div>';
html+='<div class="stat-card"><div class="sc-num gold">'+avgDays+'</div><div class="sc-label">平均上架天数</div></div>';
html+='</div>';
html+='<h4 style="font-size:14px;font-weight:600;margin:16px 0 8px">📊 爆款苗头识别 (气泡图: X=上架天数, Y=日销量, 大小=营收)</h4>';
html+='<div class="bubble-chart">';
html+='<div class="bubble-axis-x"></div><div class="bubble-axis-y"></div>';
html+='<div class="bubble-label-x">上架天数 →</div>';
html+='<div class="bubble-label-y">日均销量 →</div>';
var maxDays=Math.max.apply(null,listings.map(function(l){return l.days;}));
var maxSales=Math.max.apply(null,listings.map(function(l){return l.dailySales;}));
var maxRevenue=Math.max.apply(null,listings.map(function(l){return l.revenue;}));
listings.forEach(function(l,i){
var x=20+(l.days/maxDays)*(100-10)+'%';
var y=(1-l.dailySales/maxSales)*80+10+'%';
var size=Math.max(30,Math.round(l.revenue/maxRevenue*70));
var color=l.isHot?'var(--red)':'var(--accent)';
html+='<div class="bubble" style="left:calc('+x+' - '+size/2+'px);top:'+y+'%;width:'+size+'px;height:'+size+'px;background:'+color+'" title="'+l.name+': '+l.dailySales+'单/天, '+l.days+'天, $'+l.revenue.toFixed(0)+'/月">'+(l.isHot?'🔥':'')}</div>';
});
html+='</div>';
html+='<h4 style="font-size:14px;font-weight:600;margin:16px 0 8px">📋 新品追踪列表</h4>';
html+='<table class="new-listing-table"><thead><tr><th>ASIN</th><th>名称</th><th>上架</th><th>价格</th><th>BSR</th><th>评论</th><th>日均销量</th><th>月营收</th><th>评论增速</th><th>标签</th></tr></thead><tbody>';
listings.forEach(function(l){
html+='<tr class="'+(l.isHot?'hot':'')+'"><td>'+l.asin+'</td><td>'+l.name+'</td><td>'+l.days+'天</td><td>$'+l.price.toFixed(2)+'</td><td>#'+l.bsr.toLocaleString()+'</td><td>'+l.reviews+'</td><td>'+l.dailySales+'</td><td>$'+l.revenue.toLocaleString()+'</td><td>'+l.reviewVelocity+'/天</td><td>'+(l.isHot?'<span class="hot-badge">🔥 爆款</span>':'<span style="color:var(--muted);font-size:11px">观察中</span>')+'</td></tr>';
});
html+='</tbody></table>';
html+='<h4 style="font-size:14px;font-weight:600;margin:16px 0 8px">📈 新品销量趋势对比</h4>';
listings.forEach(function(l){
html+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">';
html+='<span style="width:100px;font-size:12px;font-weight:600">'+l.name.substring(0,12)+'</span>';
html+='<div class="trend-mini" style="flex:1">';
for(var d=0;d<14;d++){
var sales=l.dailySales*(0.3+d/l.days*0.7+Math.random()*0.15);
var h=Math.max(Math.round(sales/maxSales*22),2);
var color=l.isHot?'var(--red)':'var(--accent)';
html+='<div class="trend-mini-bar" style="height:'+h+'px;background:'+color+'"></div>';
}
html+='</div>';
html+='<span style="width:50px;font-size:12px;text-align:right;color:var(--muted)">'+l.dailySales+'单/天</span>';
html+='</div>';
});
html+='<div style="padding:16px;background:var(--accent-bg);border-radius:var(--radius-md);margin-top:16px"><h4 style="font-size:14px;font-weight:700;margin-bottom:8px">💡 竞争洞察</h4><div style="font-size:13px;color:var(--ink-soft);line-height:1.8">';
if(hotCount>0){
html+='<div>🔥 发现 <strong>'+hotCount+'</strong> 个爆款苗头新品！</div>';
html+='<div>爆款特征：日均销量≥30、评论增速≥0.5/天、上架≤20天</div>';
html+='<div>建议：分析爆款Listing的标题/图片/价格策略，借鉴其成功要素</div>';
}else{
html+='<div>暂无明显爆款苗头，持续监控新品表现</div>';
}
html+='<div>'+store+' 近期上架 '+listings.length+' 款新品，月营收总额约 $'+(totalRevenue/1000).toFixed(1)+'K</div>';
html+='<div>平均上架天数 '+avgDays+' 天，新品评论增速普遍在 '+Math.min.apply(null,listings.map(function(l){return l.reviewVelocity;}))+'~'+Math.max.apply(null,listings.map(function(l){return l.reviewVelocity;}))+' 条/天</div>';
html+='</div></div>';
html+='</div>';
document.getElementById('resultArea').innerHTML=html;
var saved=JSON.parse(localStorage.getItem('jx_new_listing')||'[]');
saved.unshift({store:store,count:listings.length,hotCount:hotCount,time:Date.now()});
if(saved.length>20)saved=saved.slice(0,20);
localStorage.setItem('jx_new_listing',JSON.stringify(saved));
}
monitorNew();

</script>
</body>
