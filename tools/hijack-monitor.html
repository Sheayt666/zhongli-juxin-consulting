<style>
:root{--bg:#ffffff;--bg-soft:#f8fafc;--surface:#ffffff;--ink:#0f172a;--ink-soft:#334155;--muted:#64748b;--muted-light:#94a3b8;--rule:#e2e8f0;--rule-light:#f1f5f9;--accent:#4f46e5;--accent-dark:#4338ca;--accent-bg:#eef2ff;--green:#10b981;--green-bg:#ecfdf5;--gold:#f59e0b;--gold-bg:#fffbeb;--red:#ef4444;--red-bg:#fef2f2;--cyan:#0891b2;--cyan-bg:#ecfeff;--shadow-sm:0 1px 2px rgba(0,0,0,0.05);--shadow-md:0 4px 6px -1px rgba(0,0,0,0.07),0 2px 4px -2px rgba(0,0,0,0.05);--shadow-lg:0 10px 15px -3px rgba(0,0,0,0.08),0 4px 6px -4px rgba(0,0,0,0.04);--shadow-xl:0 20px 25px -5px rgba(0,0,0,0.08),0 8px 10px -6px rgba(0,0,0,0.04);--radius-sm:8px;--radius-md:12px;--radius-lg:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg-soft);color:var(--ink);line-height:1.6;font-size:15px;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none;transition:color .2s}
.container{max-width:1152px;margin:0 auto;padding:0 24px}

.top-nav-logo{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:700;color:var(--ink)}
.top-nav-logo .logo-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#6366f1);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px}
.top-nav-links{display:flex;gap:28px;list-style:none}
.top-nav-links a{color:var(--ink-soft);font-size:14px;font-weight:500}
.top-nav-links a:hover{color:var(--accent)}
.workflow-nav{background:linear-gradient(135deg,#f8f9ff 0%,#f0f4ff 100%);border:1px solid #e0e7ff;border-radius:16px;padding:20px 24px;margin:24px auto;max-width:1152px;overflow-x:auto}
.workflow-nav-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:14px}
.workflow-nav-header .workflow-icon{font-size:18px}
.workflow-nav-header .workflow-name{font-weight:600;color:var(--accent)}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin:20px 0}
.stat-card{padding:18px;border-radius:var(--radius-md);text-align:center;background:var(--bg-soft);border:1px solid var(--rule-light)}
.stat-card .sc-num{font-size:26px;font-weight:800;color:var(--accent)}
.stat-card .sc-num.green{color:var(--green)}.stat-card .sc-num.red{color:var(--red)}.stat-card .sc-num.gold{color:var(--gold)}
.stat-card .sc-label{font-size:12px;color:var(--muted);margin-top:4px}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}.empty-state .icon{font-size:48px;margin-bottom:12px}
.related-tools{background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius-lg);padding:28px;margin-top:32px}
.related-tools h3{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--ink)}
.related-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.related-card{display:flex;gap:10px;padding:14px;background:var(--bg-soft);border-radius:var(--radius-sm);text-decoration:none;transition:all .2s}
.related-card:hover{background:var(--accent-bg);transform:translateX(4px)}
.related-card .ricon{font-size:20px;flex-shrink:0}.related-card .rtext{font-size:13px;font-weight:500;color:var(--ink-soft)}
.back-link{text-align:center;margin-top:32px}
.back-link a{display:inline-flex;align-items:center;gap:8px;padding:12px 32px;border-radius:50px;font-size:14px;font-weight:600;background:linear-gradient(135deg,var(--accent),#6366f1);color:#fff;box-shadow:0 4px 14px rgba(79,70,229,.3);transition:all .2s}
.back-link a:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(79,70,229,.4)}
footer{background:#0f172a;color:rgba(255,255,255,.5);padding:32px 0;text-align:center;font-size:13px;margin-top:40px}
@media(max-width:768px){.form-row,.form-row-3{grid-template-columns:1fr}.top-nav-links{display:none}}

.hijack-panel{background:var(--surface);border:1px solid var(--rule);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px}
.hijack-alert{padding:16px;border-radius:var(--radius-md);margin-bottom:16px;display:flex;align-items:center;gap:12px}
.hijack-alert.danger{background:var(--red-bg);border:1px solid #fecaca}
.hijack-alert.warning{background:var(--gold-bg);border:1px solid #fde68a}
.hijack-alert.safe{background:var(--green-bg);border:1px solid #d1fae5}
.hijack-alert .ha-icon{font-size:32px}
.hijack-alert .ha-text h4{font-size:14px;font-weight:700}
.hijack-alert .ha-text p{font-size:12px;color:var(--ink-soft)}
.hijack-table{width:100%;border-collapse:collapse;margin-top:12px}
.hijack-table th{background:var(--accent-bg);color:var(--accent);padding:10px;text-align:left;font-size:12px;font-weight:700}
.hijack-table td{padding:10px;border-bottom:1px solid var(--rule-light);font-size:13px}
.hijack-table tr.danger-row{background:var(--red-bg)}
.price-compare-bar{display:flex;height:24px;border-radius:6px;overflow:hidden;margin:4px 0}
.price-compare-segment{height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff}
.cleanup-strategy{padding:14px;background:var(--accent-bg);border-radius:var(--radius-md);margin:12px 0}
.cleanup-strategy h4{font-size:13px;font-weight:700;margin-bottom:8px}
.cleanup-strategy ol{padding-left:20px;font-size:13px;color:var(--ink-soft);line-height:1.8}

</style>

<div class="input-card">
<h2>🛡️ 跟卖监控</h2>
<div class="form-row">
<div class="form-group"><label>您的ASIN</label><input type="text" id="asin" value="B08XYZ1234" oninput="checkHijack()"></div>
<div class="form-group"><label>您的售价 ($)</label><input type="number" id="myPrice" value="29.99" step="0.01" oninput="checkHijack()"></div>
</div>
<div class="form-group"><label>跟卖者列表 (每行: 卖家名称,价格,FBA/FBM,加入日期)</label><textarea id="hijackers" rows="6" oninput="checkHijack()">SellerABC,25.99,FBA,2026-07-08
SellerXYZ,27.50,FBA,2026-07-05
SellerCheap,19.99,FBM,2026-07-10
SellerOriginal,29.99,FBA,2026-06-01</textarea></div>
</div>
<div class="result-area" id="resultArea"></div>

<div class="related-tools"><h3>🔗 相关工具</h3><div class="related-grid"><a href="competitor-pricing-strategy.html" class="related-card"><span class="ricon">💲</span><span class="rtext">竞品定价策略</span></a><a href="competitor-inventory-predictor.html" class="related-card"><span class="ricon">📦</span><span class="rtext">竞品库存预测</span></a><a href="competitor-sales-estimator.html" class="related-card"><span class="ricon">📊</span><span class="rtext">竞品销量估算</span></a><a href="new-listing-monitor.html" class="related-card"><span class="ricon">🆕</span><span class="rtext">新品监控</span></a><a href="listing-spy.html" class="related-card"><span class="ricon">🔍</span><span class="rtext">Listing监控</span></a></div></div>

<script>
function checkHijack(){
var asin=document.getElementById('asin').value.trim();
var myPrice=parseFloat(document.getElementById('myPrice').value)||0;
var hijackText=document.getElementById('hijackers').value.trim();
if(!asin||!hijackText){document.getElementById('resultArea').innerHTML='<div class="empty-state"><div class="icon">🛡️</div><p>输入ASIN和跟卖者数据<br>查看监控面板</p></div>';return;}
var hijackers=[];
hijackText.split('\n').forEach(function(line){
line=line.trim();
if(!line)return;
var parts=line.split(',');
if(parts.length>=4){
hijackers.push({name:parts[0].trim(),price:parseFloat(parts[1])||0,fulfillment:parts[2].trim(),joinDate:parts[3].trim()});
}
});
if(hijackers.length===0){document.getElementById('resultArea').innerHTML='<div class="empty-state"><div class="icon">🛡️</div><p>输入ASIN和跟卖者数据<br>查看监控面板</p></div>';return;}
var original=hijackers.find(function(h){return h.price===myPrice;})||hijackers[0];
var competitors=hijackers.filter(function(h){return h.name!==original.name;});
var undercutters=competitors.filter(function(h){return h.price<myPrice;});
var cheapest=Math.min.apply(null,hijackers.map(function(h){return h.price;}));
var fbaCount=hijackers.filter(function(h){return h.fulfillment==='FBA';}).length;
var fbmCount=hijackers.length-fbaCount;
var threatLevel=undercutters.length>=3?'danger':undercutters.length>=1?'warning':'safe';
var threatText=undercutters.length>=3?'高危 - 多个低价跟卖':undercutters.length>=1?'警告 - 存在低价跟卖':'安全 - 无低价跟卖';
var threatIcon=undercutters.length>=3?'🚨':undercutters.length>=1?'⚠️':'✅';
var html='<div class="result-card"><h3 style="font-size:18px;font-weight:700;margin-bottom:16px">🛡️ 跟卖监控面板 — '+asin+'</h3>';
html+='<div class="hijack-alert '+threatLevel+'"><div class="ha-icon">'+threatIcon+'</div><div class="ha-text"><h4 style="color:var(--'+(threatLevel==='danger'?'red':threatLevel==='warning'?'gold':'green')+')">'+threatText+'</h4><p>'+competitors.length+'个跟卖者 | '+undercutters.length+'个低价跟卖 | 最低价$'+cheapest+'</p></div></div>';
html+='<div class="stat-grid">';
html+='<div class="stat-card"><div class="sc-num accent">'+hijackers.length+'</div><div class="sc-label">总卖家数</div></div>';
html+='<div class="stat-card"><div class="sc-num red">'+undercutters.length+'</div><div class="sc-label">低价跟卖</div></div>';
html+='<div class="stat-card"><div class="sc-num gold">'+fbaCount+'</div><div class="sc-label">FBA卖家</div></div>';
html+='<div class="stat-card"><div class="sc-num">'+fbmCount+'</div><div class="sc-label">FBM卖家</div></div>';
html+='</div>';
html+='<div class="hijack-panel"><h4 style="font-size:14px;font-weight:700;margin-bottom:12px">📋 跟卖者信息表</h4>';
html+='<table class="hijack-table"><thead><tr><th>卖家</th><th>价格</th><th>配送</th><th>加入日期</th><th>vs您的价格</th><th>威胁等级</th></tr></thead><tbody>';
hijackers.forEach(function(h){
var isOriginal=h.name===original.name;
var diff=h.price-myPrice;
var threat=h.price<myPrice*0.9?'高危':h.price<myPrice?'中危':h.price===myPrice?'原始':'低危';
var threatColor=h.price<myPrice*0.9?'red':h.price<myPrice?'gold':h.price===myPrice?'green':'muted';
html+='<tr class="'+(h.price<myPrice*0.9?'danger-row':'')+'"><td>'+(isOriginal?'⭐ ':'')+h.name+'</td><td>$'+h.price.toFixed(2)+'</td><td>'+h.fulfillment+'</td><td>'+h.joinDate+'</td><td style="color:'+(diff<0?'var(--red)':diff>0?'var(--green)':'var(--muted)')+'">'+(diff<0?'-$':diff>0?'+$':'$')+Math.abs(diff).toFixed(2)+'</td><td><span style="padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:var(--'+threatColor+'-bg);color:var(--'+threatColor+')">'+threat+'</span></td></tr>';
});
html+='</tbody></table>';
html+='<div style="margin-top:12px"><div style="font-size:13px;color:var(--muted);margin-bottom:6px">价格对比：</div>';
html+='<div class="price-compare-bar">';
var totalPrice=hijackers.reduce(function(s,h){return s+h.price;},0);
hijackers.forEach(function(h){
var pct=Math.round(h.price/totalPrice*100);
var color=h.price<myPrice?'var(--red)':h.price===myPrice?'var(--green)':'var(--accent)';
html+='<div class="price-compare-segment" style="width:'+pct+'%;background:'+color+'">'+h.name.substring(0,8)+' $'+h.price+'</div>';
});
html+='</div></div></div>';
html+='<div class="cleanup-strategy"><h4>🛡️ 清理策略建议</h4><ol>';
html+='<li><strong>品牌备案投诉：</strong>如已完成品牌注册，通过Brand Registry提交侵权投诉</li>';
html+='<li><strong>Test Buy：</strong>购买跟卖者产品，收集假冒证据后向亚马逊投诉</li>';
html+='<li><strong>修改Listing：</strong>暂时修改Listing图片/标题，使跟卖者信息不匹配</li>';
html+='<li><strong>价格战：</strong>短期降价至跟卖者价格以下，迫使其退出(谨慎使用)</li>';
html+='<li><strong>透明度计划：</strong>加入Transparency Program，从源头杜绝假货跟卖</li>';
html+='<li><strong>独家包装：</strong>使用独家FBA标签和包装，增加跟卖难度</li>';
html+='<li><strong>监控预警：</strong>设置自动化监控，新跟卖者出现时立即收到通知</li>';
html+='</ol></div>';
html+='<div style="padding:16px;background:'+(threatLevel==='danger'?'var(--red-bg)':'var(--accent-bg)')+';border-radius:var(--radius-md)"><h4 style="font-size:14px;font-weight:700;margin-bottom:8px">💡 紧急程度评估</h4><div style="font-size:13px;color:var(--ink-soft);line-height:1.8">'+(threatLevel==='danger'?'<strong style="color:var(--red)">高优先级！</strong>多个低价FBA跟卖正在侵蚀你的Buy Box份额和销量。建议24小时内启动清理流程。':'<strong style="color:var(--gold)">中优先级</strong>。存在低价跟卖但数量有限。建议3天内启动Test Buy流程并准备投诉材料。')+'</div></div>';
html+='</div>';
document.getElementById('resultArea').innerHTML=html;
var saved=JSON.parse(localStorage.getItem('jx_hijack_monitor')||'[]');
saved.unshift({asin:asin,hijackerCount:hijackers.length,undercutters:undercutters.length,level:threatLevel,time:Date.now()});
if(saved.length>30)saved=saved.slice(0,30);
localStorage.setItem('jx_hijack_monitor',JSON.stringify(saved));
}
checkHijack();

</script>
